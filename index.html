<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="iRacing Late Model Stock Setup Advisor">
<title>The Big Chief - Powered by Allison Racing</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏁</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#e82a1c;--red-dark:#b81e14;--red-glow:rgba(232,42,28,0.35);--gold:#d4a827;--blue:#2874c8;--green:#28a844;--bg:#080809;--surface:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--text:#f0ece4;--text-dim:#9a958c;--text-faint:#6a665e}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--text)}

/* === BACKGROUND — asphalt + tire marks + heat haze === */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:linear-gradient(175deg,#0d0d10 0%,#080809 30%,#0a0808 60%,#080809 100%)}
/* Asphalt grain texture */
.bg::before{content:"";position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.8}
/* Tire skid marks - left */
.bg .skid1{position:absolute;top:10%;left:8px;width:3px;height:40%;background:linear-gradient(180deg,transparent,rgba(30,30,30,0.6) 20%,rgba(40,40,40,0.4) 60%,transparent);border-radius:2px;transform:rotate(1deg)}
.bg .skid2{position:absolute;top:8%;left:16px;width:2px;height:35%;background:linear-gradient(180deg,transparent,rgba(30,30,30,0.4) 25%,rgba(35,35,35,0.3) 50%,transparent);border-radius:2px;transform:rotate(0.5deg)}
/* Tire skid marks - right */
.bg .skid3{position:absolute;top:50%;right:12px;width:3px;height:30%;background:linear-gradient(180deg,transparent,rgba(30,30,30,0.5) 20%,rgba(40,40,40,0.3) 70%,transparent);border-radius:2px;transform:rotate(-1deg)}
/* Hot red glow - like brake heat */
.bg .heat1{position:absolute;top:-15%;right:-5%;width:600px;height:600px;background:radial-gradient(ellipse,rgba(232,42,28,0.07) 0%,rgba(232,42,28,0.02) 40%,transparent 70%);border-radius:50%;filter:blur(60px);animation:heatPulse 4s ease-in-out infinite}
/* Second heat glow bottom left */
.bg .heat2{position:absolute;bottom:-10%;left:-5%;width:400px;height:400px;background:radial-gradient(ellipse,rgba(232,42,28,0.04) 0%,transparent 60%);border-radius:50%;filter:blur(50px);animation:heatPulse 5s ease-in-out 1s infinite}
/* Checkered flag watermark */
.bg .checker{position:absolute;bottom:0;right:0;width:200px;height:200px;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='10' height='10' fill='white'/%3E%3Crect x='10' y='10' width='10' height='10' fill='white'/%3E%3C/svg%3E");transform:rotate(-15deg);transform-origin:bottom right}
/* Speed lines */
.bg .speed1{position:absolute;top:20%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(232,42,28,0.06) 20%,rgba(232,42,28,0.02) 50%,transparent 100%)}
.bg .speed2{position:absolute;top:45%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 10%,rgba(255,255,255,0.03) 30%,rgba(255,255,255,0.01) 60%,transparent 100%)}
.bg .speed3{position:absolute;top:70%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,rgba(232,42,28,0.04) 25%,transparent 70%)}

@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes heatPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes rpmSweep{0%{width:0}40%{width:100%}100%{width:65%}}
@keyframes redlinePulse{0%,100%{box-shadow:0 0 8px rgba(232,42,28,0.2)}50%{box-shadow:0 0 20px rgba(232,42,28,0.4)}}

.app{position:relative;z-index:1;min-height:100vh;padding:20px 16px env(safe-area-inset-bottom,40px);max-width:820px;margin:0 auto}

/* === HEADER === */
.hdr{text-align:center;margin-bottom:28px;animation:fadeIn .6s ease both;position:relative}
.hdr .flag-bar{height:8px;margin:0 -16px 16px;background-image:url("data:image/svg+xml,%3Csvg width='16' height='8' viewBox='0 0 16 8' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='8' height='8' fill='%23e8e4dc'/%3E%3Crect x='8' width='8' height='8' fill='%23181818'/%3E%3C/svg%3E");background-size:16px 8px;opacity:.12}
.sub{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--text-faint);margin-top:6px}
.hdr .redline{height:4px;width:100px;margin:14px auto 0;background:linear-gradient(90deg,transparent,var(--red),var(--red),transparent);border-radius:2px;animation:redlinePulse 3s ease-in-out infinite}
.hdr .manual-tag{display:inline-block;margin-top:12px;padding:4px 14px;border:1px solid rgba(232,42,28,0.25);border-left:3px solid var(--red);border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(232,42,28,0.6);background:rgba(232,42,28,0.04)}

/* === RPM BAR === */
.rpm-bar{height:4px;margin:0 -16px 24px;background:rgba(255,255,255,0.03);position:relative;overflow:hidden;border-bottom:1px solid rgba(255,255,255,0.04)}
.rpm-bar .fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#1a8a2e,#2ecc40 20%,var(--gold) 50%,#ff6600 70%,var(--red) 85%,#ff0000 95%);animation:rpmSweep 2.5s ease-out both;border-radius:0 2px 2px 0}

/* === TABS === */
.tabs{display:flex;gap:0;margin-bottom:24px;animation:fadeIn .6s ease .1s both;border-radius:0;overflow:hidden;border:1px solid var(--border);border-left:3px solid var(--red)}
.tab{flex:1;padding:14px 16px;border:none;cursor:pointer;font-family:'Teko',sans-serif;font-size:17px;font-weight:600;letter-spacing:3px;text-transform:uppercase;background:rgba(255,255,255,0.02);color:var(--text-faint);transition:.25s;position:relative}
.tab.on{background:rgba(232,42,28,0.1);color:var(--red)}
.tab.on::after{content:"";position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--red)}
.tab.on::before{content:"";position:absolute;top:0;right:0;width:30px;height:100%;background:linear-gradient(135deg,transparent 40%,rgba(232,42,28,0.08) 40%,rgba(232,42,28,0.08) 45%,transparent 45%)}

/* === LABELS === */
.lbl{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-family:'Teko',sans-serif;font-size:16px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-dim)}
.lbl::before{content:"";width:4px;height:16px;background:var(--red);border-radius:1px;box-shadow:0 0 6px rgba(232,42,28,0.3)}

/* === PILLS === */
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:11px 22px;border-radius:3px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.025);color:#908a80;font-family:'Teko',sans-serif;font-size:17px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.25s;user-select:none;position:relative;overflow:hidden}
.pill:active{transform:scale(.95)}
.pill.on{background:rgba(212,168,39,0.12);border-color:var(--gold);color:var(--gold);box-shadow:0 0 14px rgba(212,168,39,0.12),inset 0 0 20px rgba(212,168,39,0.04)}
.pill.loose.on{background:rgba(232,42,28,0.1);border-color:var(--red);color:var(--red);box-shadow:0 0 14px rgba(232,42,28,0.15),inset 0 0 20px rgba(232,42,28,0.04)}
.pill.tight.on{background:rgba(40,116,200,0.1);border-color:var(--blue);color:var(--blue);box-shadow:0 0 14px rgba(40,116,200,0.12),inset 0 0 20px rgba(40,116,200,0.04)}
.pill.neutral.on{background:rgba(40,168,68,0.1);border-color:var(--green);color:var(--green);box-shadow:0 0 14px rgba(40,168,68,0.1)}
.pill.sm{font-size:15px;padding:9px 16px}
.pill.on::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:currentColor;opacity:.4}

/* === SEVERITY === */
.sev-btn{padding:12px 16px;border-radius:3px;cursor:pointer;transition:.25s;display:flex;flex-direction:column;gap:3px;min-width:95px;user-select:none;position:relative;overflow:hidden}
.sev-btn:active{transform:scale(.95)}
.sev-btn .sl{font-family:'Teko',sans-serif;font-size:18px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.sev-btn .sd{font-family:'Rajdhani',sans-serif;font-size:11px;line-height:1.3;font-weight:400}

/* === SELECT === */
.sel{width:100%;padding:13px 16px;background:rgba(255,255,255,0.035);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:3px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:500;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23e82a1c' stroke-width='2' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 16px center}.sel:focus{outline:0;border-color:var(--red);box-shadow:0 0 0 2px rgba(232,42,28,0.15)}.sel option{background:#0e0e10;color:var(--text)}

/* === TIRE INPUTS === */
.tire-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.tire-corner{padding:14px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:4px;border-left:3px solid var(--red)}
.tire-corner.rear{border-left-color:var(--gold)}
.tire-corner-label{font-family:'Teko',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
.tire-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tire-row:last-child{margin-bottom:0}
.tire-row label{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:500;color:var(--text-faint);min-width:32px}
.tire-input{flex:1;padding:8px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;text-align:center;width:100%}
.tire-input:focus{outline:0;border-color:var(--red);box-shadow:0 0 0 2px rgba(232,42,28,0.12)}
.tire-input::placeholder{color:rgba(255,255,255,0.15);font-weight:400}
.tire-build{font-family:'Teko',sans-serif;font-size:14px;font-weight:500;color:var(--text-faint);text-align:center;min-width:50px}
.tire-build.high{color:var(--red)}
.tire-build.ok{color:var(--green)}
.tire-build.low{color:var(--blue)}

/* === GO BUTTON === */
.go{width:100%;padding:18px;border:0;border-radius:3px;font-family:'Teko',sans-serif;font-size:20px;font-weight:700;letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:.3s;background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);color:white;margin-top:14px;box-shadow:0 4px 24px var(--red-glow);position:relative;overflow:hidden}
.go::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 10px,rgba(255,255,255,0.03) 10px,rgba(255,255,255,0.03) 20px)}
.go::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);transition:.6s}
.go:not(:disabled):hover::after{left:100%}
.go:disabled{opacity:.2;cursor:not-allowed;box-shadow:none}
.go:active:not(:disabled){transform:scale(.97);box-shadow:0 2px 12px var(--red-glow)}

.rst{width:100%;padding:12px;border:1px solid rgba(255,255,255,0.08);border-radius:3px;background:0;font-family:'Teko',sans-serif;font-size:15px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);cursor:pointer;transition:.2s}
.rst:active{background:rgba(255,255,255,0.03)}

/* === CARDS === */
.card{margin-bottom:20px;padding:22px 18px;background:linear-gradient(135deg,rgba(15,15,18,0.95),rgba(12,12,14,0.98));border:1px solid var(--border);border-radius:4px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.015'/%3E%3C/svg%3E");pointer-events:none}
.card::after{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--red),var(--red-dark));box-shadow:0 0 8px rgba(232,42,28,0.3)}
.card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:6px;position:relative;z-index:1}
.card-hdr h3{font-family:'Teko',sans-serif;font-size:24px;font-weight:600;letter-spacing:2px;text-transform:uppercase}

.sev-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:2px;margin-bottom:14px;position:relative;z-index:1}
.sev-badge span{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.intro-text{color:#9a9688;font-size:14px;line-height:1.6;margin-bottom:16px;font-style:italic;position:relative;z-index:1;border-left:3px solid rgba(232,42,28,0.3);padding-left:14px}

.sug{padding:14px 16px;margin-bottom:8px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.05);border-left:3px solid rgba(232,42,28,0.15);border-radius:2px;transition:.25s;position:relative;z-index:1}
.sug:active,.sug:hover{background:rgba(232,42,28,0.04);border-left-color:var(--red);box-shadow:0 0 12px rgba(232,42,28,0.08)}
.sug .num{color:var(--red);font-family:'Teko',sans-serif;font-size:18px;font-weight:700;min-width:26px;opacity:.5}
.sug .adj{color:var(--text);font-family:'Teko',sans-serif;font-size:18px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.sug .tip{color:#a8a49a;font-size:13px;line-height:1.7;margin-left:36px;margin-top:4px;font-family:'Rajdhani',sans-serif;font-weight:500}

.ibox{padding:14px 16px;border-radius:3px;margin-bottom:10px;position:relative;z-index:1}
.ibox .il{font-family:'Teko',sans-serif;font-size:15px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px}
.ibox p{color:#d4d0c8;font-size:14px;line-height:1.6;font-family:'Rajdhani',sans-serif;font-weight:500}

.nbox{padding:20px;border-radius:4px;background:rgba(40,168,68,0.06);border:1px solid rgba(40,168,68,0.2);border-left:4px solid var(--green)}
.nbox h4{font-family:'Teko',sans-serif;font-size:20px;font-weight:600;letter-spacing:2px;color:var(--green);display:flex;align-items:center;gap:8px;margin-bottom:8px;text-transform:uppercase}
.nbox p{color:var(--text-dim);font-size:14px;line-height:1.6;font-family:'Rajdhani',sans-serif}

.sep{width:100%;height:2px;margin:16px 0 20px;background:linear-gradient(90deg,var(--red),rgba(232,42,28,0.4) 30%,rgba(232,42,28,0.05) 70%,transparent);border-radius:1px}
.sec-lbl{font-family:'Teko',sans-serif;font-size:18px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:var(--red);margin-bottom:20px;text-align:center;display:flex;align-items:center;justify-content:center;gap:14px}
.sec-lbl::before,.sec-lbl::after{content:"";flex:1;height:2px;max-width:50px}
.sec-lbl::before{background:linear-gradient(90deg,transparent,rgba(232,42,28,0.4))}
.sec-lbl::after{background:linear-gradient(270deg,transparent,rgba(232,42,28,0.4))}

details{margin-bottom:20px}
details summary{font-family:'Teko',sans-serif;font-size:15px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);cursor:pointer;padding:12px 0}
details .ref{padding:16px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-left:3px solid rgba(232,42,28,0.2);border-radius:2px;font-size:13px;color:#7a7668;line-height:1.8;font-family:'Rajdhani',sans-serif;font-weight:500}
details .ref strong{color:var(--text-dim)}

.ftr{text-align:center;margin-top:24px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#2a2820}
.ftr-bar{height:8px;margin:20px -16px 0;background-image:url("data:image/svg+xml,%3Csvg width='16' height='8' viewBox='0 0 16 8' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='8' height='8' fill='%23e8e4dc'/%3E%3Crect x='8' width='8' height='8' fill='%23181818'/%3E%3C/svg%3E");background-size:16px 8px;opacity:.08}

.gap{margin-bottom:22px}.hide{display:none!important}
.ibanner{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:16px;background:linear-gradient(180deg,transparent,#080809 30%)}
.ibtn{display:block;width:100%;max-width:400px;margin:0 auto;padding:14px;border:1px solid rgba(232,42,28,0.4);border-left:3px solid var(--red);border-radius:3px;background:rgba(232,42,28,0.08);font-family:'Teko',sans-serif;font-size:17px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--red);cursor:pointer;text-align:center}
</style>
</head>
<body>
<div class="bg">
  <div class="skid1"></div><div class="skid2"></div><div class="skid3"></div>
  <div class="heat1"></div><div class="heat2"></div>
  <div class="checker"></div>
  <div class="speed1"></div><div class="speed2"></div><div class="speed3"></div>
</div>
<div class="app" id="app">
<div class="hdr">
  <div class="flag-bar"></div>
  <img src="logo.png" alt="The Big Chief - Powered by Allison Racing" style="width:min(90%,400px);height:auto;margin:0 auto 8px;display:block">
  <p class="sub" style="font-size:11px;letter-spacing:3px;margin-top:2px;color:var(--text-ghost)">iRacing Late Model Stock · Setup Advisor</p>
  <div class="redline"></div>
  <div class="manual-tag">Manual V3 Verified</div>
</div>
<div class="rpm-bar"><div class="fill"></div></div>
<a href="Big%20Chief.apk" download style="display:block;width:100%;margin-bottom:16px;padding:12px;border-radius:3px;border:1px solid rgba(40,168,68,0.4);border-left:3px solid var(--green);background:rgba(40,168,68,0.08);text-align:center;text-decoration:none;font-family:'Teko',sans-serif;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--green)">📲 Download Android App (.apk)</a>
<div class="tabs"><button class="tab on" data-t="handling">Handling</button><button class="tab" data-t="gearing">Gearing</button><button class="tab" data-t="tires">Tires</button></div>
<div id="p-handling">
<div class="gap"><label class="lbl">Where in the corner?</label><div class="pills" id="corner-pills"></div></div>
<div class="gap"><label class="lbl">How's the car handling?</label><div class="pills" id="handling-pills"></div></div>
<div id="sev-section" class="hide"><div class="gap"><label class="lbl">How bad is it?</label><div class="pills" id="sev-pills"></div></div></div>
<div id="neutral-msg" class="hide"></div>
</div>
<div id="p-gearing" class="hide">
<div class="gap"><label class="lbl">Select Track</label><select class="sel" id="track-sel"><option value="">Choose a track...</option></select></div>
<div class="gap"><label class="lbl">How hard on the chip?</label><div class="pills" id="chip-pills"></div></div>
</div>
<div id="p-tires" class="hide">
<label class="lbl">Enter Cold Pressures (psi)</label>

const ADV={"Entry-Loose":{title:"Loose on Entry",mild:{intro:"Just a slight wiggle on turn-in. One small change:",items:[{a:"Brake Balance Bar",t:"Increase by 0.5–1% (more front bias). Keeps front loaded so the rear doesn't step out."},{a:"Rear Rebound Stiffness",t:"Increase by 1-2 clicks — holds the rear during braking-to-turn-in transition."}]},moderate:{intro:"Rear stepping out noticeably. Combine 2-3 of these:",items:[{a:"Brake Balance Bar",t:"Increase by 1–2% (more front bias) to keep weight forward under braking."},{a:"Front Bump Stiffness",t:"Increase by 2-3 clicks — tightens under braking by slowing front compression."},{a:"Cross Weight",t:"Increase slightly — adds weight to LR & RF diagonal, planting the rear."},{a:"RF Packer",t:"Add a small RF packer — shifts weight to RF sooner on entry, stabilizing."}]},severe:{intro:"Car is spinning or nearly spinning on entry. Work through these in order:",items:[{a:"Brake Balance Bar",t:"Increase by 2-3% toward front. Need significantly more front braking force."},{a:"Cross Weight",t:"Increase by 0.5–1.0% — shift diagonal weight to tighten the rear."},{a:"Front Bump Stiffness",t:"Increase by 3-5 clicks — resist front dive so rear doesn't unload violently."},{a:"Rear Rebound Stiffness",t:"Increase by 3-4 clicks — physically holds the rear down."},{a:"LR Track Bar Height",t:"Lower the left-side mount — increases LR grip directly."},{a:"Nose Weight / Ballast Forward",t:"Move ballast forward — more front weight stops the rear from swinging."},{a:"Front Caster Split",t:"Reduce LF-to-RF caster split — less aggressive corner pull."}]}},

function render(){
document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.t===S.tab));

$("sev-section").classList.toggle("hide",!showSev);
$("sev-pills").querySelectorAll(".sev-btn").forEach(b=>{const v=b.dataset.v,s=SEV[v],on=S.sev===v;b.style.border="1px solid "+(on?s.color:"rgba(255,255,255,0.1)");b.style.background=on?s.color+"18":"rgba(255,255,255,0.03)";b.querySelector(".sl").style.color=on?s.color:"#908a80";b.querySelector(".sd").style.color=on?s.color+"cc":"var(--text-faint)"});
if(S.handling==="Neutral"&&S.corner){$("neutral-msg").classList.remove("hide");$("neutral-msg").innerHTML='<div class="nbox"><h4>✅ CAR IS BALANCED</h4><p>Neutral on '+S.corner.toLowerCase()+'? You\'re in the zone. Smooth hands, progressive throttle, consistent braking. Shift by ear before 7,200 RPM.</p></div>'}else{$("neutral-msg").classList.add("hide");$("neutral-msg").innerHTML=""}

{a:"Why This Helps",t:"With a shorter gear, the engine RPM stays higher through the braking zone. When you lift off the throttle, the engine acts like a brake on the rear wheels. This takes a huge load off your brake pads and reduces the chance of locking up. You won't need to stand on the chip as hard."},

{a:"Test Going UP 1-2 Points",t:"Try going UP 1-2 points (e.g., 4.56 → 4.58). A slightly shorter gear will give you a touch more engine braking, which might let you get off the brake even earlier and roll more speed through the center."},
{a:"Or Test Going DOWN 1-2 Points",t:"If the car feels like it bogs on exit or you're hitting the limiter too early, try going DOWN 1-2 points (e.g., 4.56 → 4.54) for more top-end pull. You'll carry a bit more speed down the straight."},
{a:"Brake Balance Bar",t:"With light braking, balance bar is less critical — but if the car pushes on entry, try dropping 0.5% toward the rear to help the car rotate into the corner."},
];

}

});
