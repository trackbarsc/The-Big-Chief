<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="iRacing Late Model Stock Setup Advisor — Based on the official LMS User Manual V3">
<title>The Allison Crew Chief</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏁</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c8a03c;--gold-dim:rgba(200,160,60,0.15);--gold-glow:rgba(200,160,60,0.25);
  --red:#dc5028;--blue:#3c78c8;--green:#3cb450;
  --bg:#0a0a0f;--surface:rgba(255,255,255,0.02);--border:rgba(255,255,255,0.06);
  --text:#e8e4dc;--text-dim:#8a8478;--text-faint:#6a665e;--text-ghost:#4a4840;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);font-family:'Barlow',sans-serif;color:var(--text)}

.bg{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0a0a0f 0%,#111118 40%,#0d0d14 100%)}
.bg .g1{position:absolute;top:-30%;right:-20%;width:500px;height:500px;background:radial-gradient(circle,rgba(200,160,60,0.06) 0%,transparent 70%);border-radius:50%;filter:blur(60px)}
.bg .g2{position:absolute;bottom:-30%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(180,30,30,0.04) 0%,transparent 70%);border-radius:50%;filter:blur(60px)}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes rev{0%{transform:rotate(-120deg)}50%{transform:rotate(30deg)}100%{transform:rotate(-10deg)}}

.app{position:relative;z-index:1;min-height:100vh;padding:20px 16px env(safe-area-inset-bottom,40px);max-width:820px;margin:0 auto}

/* Header */
.hdr{text-align:center;margin-bottom:36px;animation:fadeIn .6s ease both}
.tach{width:68px;height:68px;margin:0 auto 14px;border-radius:50%;border:2px solid rgba(200,160,60,0.4);background:rgba(200,160,60,0.05);display:flex;align-items:center;justify-content:center}
.ttl{font-family:'Oswald',sans-serif;font-size:clamp(28px,6vw,42px);font-weight:700;letter-spacing:3px;text-transform:uppercase;line-height:1.1;background:linear-gradient(135deg,#c8a03c 0%,#e8d080 50%,#c8a03c 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}
.sub{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--text-faint);margin-top:8px}
.sub2{font-size:11px;color:var(--text-ghost);margin-top:4px}
.div{width:60px;height:1px;margin:14px auto 0;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* Tabs */
.tabs{display:flex;justify-content:center;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px;animation:fadeIn .6s ease .1s both}
.tab{padding:10px 22px;border:none;cursor:pointer;font-family:'Oswald',sans-serif;font-size:13px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;background:0;color:var(--text-faint);border-bottom:2px solid transparent;transition:.2s}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* Labels */
.lbl{display:block;margin-bottom:10px;font-family:'Oswald',sans-serif;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}

/* Pills */
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:10px 18px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#a09a8e;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:.2s;user-select:none}
.pill:active{transform:scale(.97)}
.pill.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.pill.loose.on{background:rgba(220,80,40,0.15);border-color:var(--red);color:var(--red)}
.pill.tight.on{background:rgba(60,120,200,0.15);border-color:var(--blue);color:var(--blue)}
.pill.neutral.on{background:rgba(60,180,80,0.15);border-color:var(--green);color:var(--green)}
.pill.sm{font-size:12px;padding:8px 14px}

/* Select */
.sel{width:100%;padding:12px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23c8a03c' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 16px center;transition:.2s}
.sel:focus{outline:0;border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,160,60,0.15)}
.sel option{background:#1a1a24;color:var(--text)}

/* Buttons */
.go{width:100%;padding:16px;border:0;border-radius:8px;font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.3s;background:linear-gradient(135deg,#c8a03c 0%,#a07820 100%);color:#0a0a0f;margin-top:12px;box-shadow:0 4px 16px rgba(200,160,60,0.2)}
.go:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}
.go:active:not(:disabled){transform:scale(.98)}
.rst{width:100%;padding:12px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:0;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--text-faint);cursor:pointer;transition:.2s}

/* Cards */
.card{margin-bottom:20px;padding:20px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.card-hdr h3{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;letter-spacing:1px}
.sug{padding:14px 16px;margin-bottom:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;transition:.25s}
.sug:active,.sug:hover{background:rgba(200,160,60,0.08);border-color:var(--gold-glow)}
.sug .num{color:var(--gold);font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;opacity:.6;min-width:22px}
.sug .adj{color:var(--gold);font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px}
.sug .tip{color:#b8b4aa;font-size:13px;line-height:1.65;margin-left:32px;margin-top:4px}

.ibox{padding:14px 16px;border-radius:8px;margin-bottom:10px}
.ibox .il{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.ibox p{color:#d4d0c8;font-size:13px;line-height:1.6}

.nbox{padding:18px 20px;border-radius:10px;background:rgba(60,180,80,0.06);border:1px solid rgba(60,180,80,0.2)}
.nbox h4{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:1px;color:var(--green);display:flex;align-items:center;gap:8px;margin-bottom:8px}
.nbox p{color:var(--text-dim);font-size:14px;line-height:1.6}

.sep{width:100%;height:1px;margin:16px 0 24px;background:linear-gradient(90deg,transparent,rgba(200,160,60,0.3),transparent)}
.sec-lbl{font-family:'Oswald',sans-serif;font-size:12px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:20px;text-align:center}

details{margin-bottom:20px}
details summary{font-family:'Oswald',sans-serif;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);cursor:pointer;padding:12px 0}
details .ref{padding:16px;background:var(--surface);border:1px solid rgba(255,255,255,0.04);border-radius:8px;font-size:12px;color:#7a7668;line-height:1.8}
details .ref strong{color:var(--text-dim)}

.ftr{text-align:center;margin-top:24px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#3a3830}

.gap{margin-bottom:22px}
.hide{display:none!important}

/* Install banner */
.ibanner{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:16px;background:linear-gradient(180deg,transparent,#0a0a0f 30%)}
.ibtn{display:block;width:100%;max-width:400px;margin:0 auto;padding:14px;border:1px solid rgba(200,160,60,0.4);border-radius:10px;background:rgba(200,160,60,0.1);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--gold);cursor:pointer;text-align:center}
</style>
</head>
<body>

<div class="bg"><div class="g1"></div><div class="g2"></div></div>

<div class="app" id="app">
  <!-- Header -->
  <div class="hdr">
    <div class="tach">
      <svg width="34" height="34" viewBox="0 0 36 36" fill="none">
        <path d="M18 4C10.268 4 4 10.268 4 18s6.268 14 14 14 14-6.268 14-14S25.732 4 18 4z" stroke="#c8a03c" stroke-width="1.5" fill="none"/>
        <path d="M18 8v2M8 18h2M28 18h-2M18 28v-2" stroke="#c8a03c" stroke-width="1" opacity=".5"/>
        <line x1="18" y1="18" x2="18" y2="10" stroke="#c8a03c" stroke-width="2" stroke-linecap="round" style="transform-origin:18px 18px;animation:rev 2s ease-out both"/>
        <circle cx="18" cy="18" r="2.5" fill="#c8a03c"/>
      </svg>
    </div>
    <h1 class="ttl">The Allison<br>Crew Chief</h1>
    <p class="sub">iRacing Late Model Stock — Setup Advisor</p>
    <p class="sub2">Based on the official iRacing LMS User Manual V3</p>
    <div class="div"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab on" data-t="handling">Handling</button>
    <button class="tab" data-t="gearing">Gearing & Brakes</button>
  </div>

  <!-- Handling Panel -->
  <div id="p-handling">
    <div class="gap">
      <label class="lbl">Where in the corner?</label>
      <div class="pills" id="corner-pills"></div>
    </div>
    <div class="gap">
      <label class="lbl">How's the car handling?</label>
      <div class="pills" id="handling-pills"></div>
    </div>
    <div id="neutral-msg" class="hide"></div>
  </div>

  <!-- Gearing Panel -->
  <div id="p-gearing" class="hide">
    <div class="gap">
      <label class="lbl">Select Track</label>
      <select class="sel" id="track-sel"><option value="">Choose a track...</option></select>
    </div>
    <div class="gap">
      <label class="lbl">How hard are you on the chip? (brake pedal)</label>
      <div class="pills" id="chip-pills"></div>
    </div>
  </div>

  <button class="go" id="go-btn" disabled>Get Setup Advice</button>
  <div id="results" class="hide"></div>
</div>

<!-- Install Banner -->
<div class="ibanner hide" id="ib"><button class="ibtn" id="ib-btn">📲 Install to Home Screen</button></div>

<script>
// ═══ DATA ═══════════════════════════════════════════════════
const TRACKS=[
{n:"Bristol Motor Speedway",l:.533,t:"short",c:"Very hard on chip — heavy braking zone, tight paperclip corners"},
{n:"Charlotte Motor Speedway",l:1.5,t:"intermediate",c:"Moderate chip, lift-and-coast through center"},
{n:"Darlington Raceway",l:1.366,t:"intermediate",c:"Asymmetric — harder on chip in turns 3-4"},
{n:"Daytona International Speedway",l:2.5,t:"superspeedway",c:"Minimal chip usage, WOT most of the lap"},
{n:"Dover Motor Speedway",l:1.0,t:"short",c:"Concrete surface, moderate chip"},
{n:"Five Flags Speedway",l:.5,t:"short",c:"Tight half-mile, moderate-heavy chip"},
{n:"Hickory Motor Speedway",l:.363,t:"short",c:"Very tight bullring, heavy chip"},
{n:"Homestead-Miami Speedway",l:1.5,t:"intermediate",c:"Progressive banking, light chip"},
{n:"Iowa Speedway",l:.875,t:"short",c:"Moderate chip, short track feel"},
{n:"Irwindale Speedway",l:.5,t:"short",c:"Half-mile, moderate chip"},
{n:"Kansas Speedway",l:1.5,t:"intermediate",c:"Moderate chip, progressive banking helps"},
{n:"Langley Speedway",l:.395,t:"short",c:"Tight bullring, heavy chip usage"},
{n:"Las Vegas Motor Speedway",l:1.5,t:"intermediate",c:"Light chip, flat corners"},
{n:"Martinsville Speedway",l:.526,t:"short",c:"Extremely hard on chip — heavy braking paperclip"},
{n:"Michigan International Speedway",l:2.0,t:"superspeedway",c:"Light chip, high speed sweepers"},
{n:"New Hampshire Motor Speedway",l:1.058,t:"short",c:"Flat track, moderate-heavy chip"},
{n:"North Wilkesboro Speedway",l:.625,t:"short",c:"Uphill/downhill, moderate chip"},
{n:"Phoenix Raceway",l:1.0,t:"short",c:"Dogleg adds chip usage, moderate"},
{n:"Pocono Raceway",l:2.5,t:"superspeedway",c:"Three unique turns — heavy chip in Tunnel Turn"},
{n:"Richmond Raceway",l:.75,t:"short",c:"D-shaped, moderate chip"},
{n:"Rockingham Speedway",l:1.017,t:"short",c:"Narrow groove, moderate chip"},
{n:"South Boston Speedway",l:.4,t:"short",c:"Tight bullring, heavy braking"},
{n:"Southern National Motorsports Park",l:.4,t:"short",c:"Tight 4/10 mile, heavy chip"},
{n:"Talladega Superspeedway",l:2.66,t:"superspeedway",c:"Minimal chip, drafting track"},
{n:"Texas Motor Speedway",l:1.5,t:"intermediate",c:"Repaved — light chip, high grip"},
];

const ADV={
"Entry-Loose":{title:"Loose on Entry",items:[
{a:"Brake Balance Bar",t:"Increase (more front bias) — keeps front tires loaded longer under braking and prevents rear from stepping out."},
{a:"Rear Rebound Stiffness",t:"Increase — holds the rear in place under braking and corner entry. Try increasing LR rebound specifically to stabilize."},
{a:"Front Bump Stiffness",t:"Increase — tightens the car under braking and on entry by slowing front compression."},
{a:"Cross Weight",t:"Increase — adds weight to the LR & RF diagonal, planting the rear under braking."},
{a:"LR Track Bar Height",t:"Lower the left-side track bar mount — increases LR grip and stabilizes entry."},
{a:"Nose Weight / Ballast Forward",t:"Move ballast forward — increases front weight percentage, plants the front and reduces rear swing."},
{a:"RF Packer",t:"Add RF packer — shifts weight to RF sooner on entry which stabilizes the car, per the manual."},
{a:"Front Caster Split",t:"Reduce the LF-to-RF caster split — less split means the car won't pull as hard into the corner, reducing snap rotation."},
]},
"Entry-Tight":{title:"Tight on Entry",items:[
{a:"Brake Balance Bar",t:"Decrease (more rear bias) — shifts braking force rearward to help rotate the car under braking."},
{a:"Front Bump Stiffness",t:"Decrease — loosens the car under braking and entry by letting the front load up faster."},
{a:"Rear Rebound Stiffness",t:"Decrease — allows the rear to unload more freely on entry. Specifically, reduce RR rebound to free up entry."},
{a:"Cross Weight",t:"Decrease — shifts weight to the LF/RR diagonal, loosening the car through entry and center."},
{a:"LR Track Bar Height",t:"Raise the left-side track bar mount — helps the car rotate into the center of the corner."},
{a:"Nose Weight / Ballast Forward",t:"Move ballast rearward — less front weight lets the nose bite and turn in better."},
{a:"LF Packer",t:"Add LF packer — can loosen the car on corner entry and reduce front bar load, per the manual."},
{a:"Front Caster Split",t:"Run less caster on the LF than RF — the manual says this makes the car pull harder left and enter more aggressively."},
]},
"Center-Loose":{title:"Loose in the Center",items:[
{a:"Cross Weight",t:"Increase — more weight on the LR/RF diagonal tightens the car through the center of the corner."},
{a:"Track Bar Height (both sides)",t:"Lower both track bar mounts equally — reduces rear roll stiffness and tightens the chassis while cornering."},
{a:"RR Spring Rate",t:"Increase — the RR is usually stiffer to compensate for no rear ARB. More RR spring plants the rear mid-corner."},
{a:"Rear Bump Stiffness",t:"Increase — tightens the car during suspension travel, adding stability through the center."},
{a:"Front ARB Diameter",t:"Decrease — smaller front ARB reduces front roll stiffness, letting the front grip up better through the arc."},
{a:"Tire Pressures",t:"Lower RR cold pressure slightly — lower pressures increase grip per the manual. More RR grip stabilizes center."},
{a:"RF Bumpstop Rate",t:"Soften — increases front mechanical grip through the arc by letting the front work more."},
]},
"Center-Tight":{title:"Tight in the Center",items:[
{a:"Cross Weight",t:"Decrease — the manual states lower values shift weight to LF/RR and induce oversteer through center."},
{a:"Track Bar Height (both sides)",t:"Raise both track bar mounts equally — increases rear roll stiffness and frees up the chassis through all cornering phases."},
{a:"RR Spring Rate",t:"Soften — allows more rear body roll and rotation mid-corner. The LR/RR split controls rear roll without a rear ARB."},
{a:"Front ARB Diameter",t:"Increase — more front roll stiffness can push the front through the center, helping the rear come around."},
{a:"Rear Bump Stiffness",t:"Decrease — loosens the car during suspension travel by letting the rear move more freely."},
{a:"Tire Pressures",t:"Lower front cold pressures for more front grip. Consider raising RR pressure slightly to reduce rear grip."},
{a:"Corner Weight Tuning",t:"Adjust spring perch offsets to shift weight — fine-tuning corner weights can help loosen the center balance."},
]},
"Exit-Loose":{title:"Loose on Exit",items:[
{a:"Rear Bump Stiffness",t:"Increase — the manual says increasing rear bump stiffness tightens the car under acceleration and on corner exit."},
{a:"Cross Weight",t:"Increase — more weight on the LR tire means better on-throttle traction. The manual notes this for low-grip tracks."},
{a:"RR Spring Rate",t:"Increase — stiffer RR plants the rear under acceleration. The RR spring compensates for having no rear ARB."},
{a:"Front Rebound Stiffness (LF)",t:"Increase LF rebound — the manual says this increases traction and understeer on exit, planting the rear."},
{a:"RR Track Bar Height",t:"Lower the right-side mount — increases RR grip on exit. The manual says lowering increases grip on that tire."},
{a:"Truck Arm Mount",t:"Lower — the manual says lower truck arm mounts increase rear end bite and reduce rear steer."},
{a:"Tire Pressures",t:"Lower LR/RR cold pressures — more rear grip on throttle application."},
]},
"Exit-Tight":{title:"Tight on Exit",items:[
{a:"Rear Bump Stiffness",t:"Decrease — the manual says decreasing rear bump stiffness loosens the car under acceleration and on corner exit."},
{a:"Cross Weight",t:"Decrease — shifts weight off the LR/RF diagonal, reducing on-throttle understeer."},
{a:"Front Rebound Stiffness (RF)",t:"Increase RF rebound — the manual says this frees up the chassis on corner exit."},
{a:"RR Track Bar Height",t:"Raise the right-side mount — reduces RR grip, freeing the chassis from center to exit. Manual calls this a good fix."},
{a:"RR Spring Rate",t:"Soften — allows more rear movement on throttle, letting the rear rotate."},
{a:"Truck Arm Mount",t:"Raise — reduces rear end grip and increases rear steer, helping the car rotate off the corner."},
{a:"Tire Pressures",t:"Raise rear cold pressures slightly — reduces rear grip on acceleration which frees the car on exit."},
]},
};

// ═══ STATE ══════════════════════════════════════════════════
let S={tab:"handling",corner:"",handling:"",track:"",chip:"",show:false};

// ═══ DOM ════════════════════════════════════════════════════
const $=id=>document.getElementById(id);
const pH=$("p-handling"),pG=$("p-gearing"),goBtn=$("go-btn"),res=$("results"),nMsg=$("neutral-msg"),tSel=$("track-sel");

// ═══ BUILD ══════════════════════════════════════════════════
function mkPills(el,items,grp,cls){
  el.innerHTML="";
  items.forEach(v=>{
    const b=document.createElement("button");
    b.className="pill"+(cls?" "+cls:"");
    if(grp==="handling"){
      const ic={Loose:"🔥",Tight:"🧊",Neutral:"✅"};
      b.textContent=ic[v]+" "+v;
      b.classList.add(v.toLowerCase());
    } else b.textContent=v;
    b.dataset.v=v;
    b.onclick=()=>{
      if(grp==="corner")S.corner=v;
      else if(grp==="handling")S.handling=v;
      else if(grp==="chip")S.chip=v;
      S.show=false;render();
    };
    el.appendChild(b);
  });
}

TRACKS.forEach(t=>{const o=document.createElement("option");o.value=t.n;o.textContent=t.n+" ("+t.l+" mi)";tSel.appendChild(o)});
tSel.onchange=e=>{S.track=e.target.value;S.show=false;render()};

mkPills($("corner-pills"),["Entry","Center","Exit"],"corner");
mkPills($("handling-pills"),["Loose","Tight","Neutral"],"handling");
mkPills($("chip-pills"),["Barely touching it","Moderate pressure","Standing on it hard","Locking up / sliding"],"chip","sm");

document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{S.tab=b.dataset.t;S.show=false;render()});
goBtn.onclick=()=>{S.show=true;render();setTimeout(()=>res.scrollIntoView({behavior:"smooth"}),100)};

// ═══ GEAR ADVICE ════════════════════════════════════════════
function gearAdv(tn,cl){
  const t=TRACKS.find(x=>x.n===tn);if(!t)return null;
  let g="",ch="",rpm="7,200";

  if(t.t==="superspeedway")g=t.n+" is a drafting track. Set a taller rear end ratio (lower number, ~3.00–3.40) for max top speed. Hit the "+rpm+" RPM limiter briefly before the braking zone.";
  else if(t.t==="intermediate")g="Intermediate gearing at "+t.n+": Rear end ratio ~3.40–3.80. Hit "+rpm+" RPM briefly before the braking zone at end of back straight. Shift by ear — no tachometer.";
  else g="Short track gearing at "+t.n+": Shorter rear end ratio (higher number, ~4.00–5.00+) for max corner exit acceleration. Hit "+rpm+" RPM before braking zone. Corner exit pull > top speed here.";

  if(cl==="Standing on it hard"||cl==="Locking up / sliding"){
    const lk=cl==="Locking up / sliding";
    ch="You're overworking the brakes"+(lk?" and locking up":"")+". At "+t.n+", "+t.c.toLowerCase()+". The Brake Balance Bar controls front/rear split — locking fronts: decrease value. Locking rears: increase value. Values over 50% = more front. Trail-brake: hard initial hit, smooth release as you turn in. "+(lk?"Locking means you've exceeded grip — reduce total brake pressure.":"Ease off earlier, roll speed into center.");
    if(t.t==="short")ch+=" Downshift earlier to use engine braking. Upshift: lift throttle. Downshift: blip throttle. No clutch once rolling.";
  }else if(cl==="Moderate pressure"){
    ch="Good middle ground. At "+t.n+", "+t.c.toLowerCase()+". Fine-tune Brake Balance Bar — higher values tighten under braking (understeer), lower values loosen (oversteer). Use that to control entry rotation.";
  }else if(cl==="Barely touching it"){
    ch="Light braking at "+t.n+". "+t.c+". A harder initial hit followed by a smooth trail-off can give better rotation. ";
    ch+=t.t==="short"?"On short tracks you typically need more brake than expected.":"On a bigger track this may be fine — many intermediates are lift-and-roll.";
  }
  return{g,ch};
}

// ═══ RENDER ═════════════════════════════════════════════════
function render(){
  // Tabs
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.t===S.tab));
  pH.classList.toggle("hide",S.tab!=="handling");
  pG.classList.toggle("hide",S.tab!=="gearing");

  // Pills
  $("corner-pills").querySelectorAll(".pill").forEach(p=>p.classList.toggle("on",p.dataset.v===S.corner));
  $("handling-pills").querySelectorAll(".pill").forEach(p=>p.classList.toggle("on",p.dataset.v===S.handling));
  $("chip-pills").querySelectorAll(".pill").forEach(p=>p.classList.toggle("on",p.dataset.v===S.chip));

  // Neutral
  if(S.handling==="Neutral"&&S.corner){
    nMsg.classList.remove("hide");
    nMsg.innerHTML='<div class="nbox"><h4>✅ CAR IS BALANCED</h4><p>If the car feels neutral on '+S.corner.toLowerCase()+', you\'re in good shape. Focus on smooth hands, progressive throttle, consistent braking points. The manual recommends smooth, consistent laps before chasing the setup. No tachometer — shift by ear before 7,200 RPM.</p></div>';
  }else{nMsg.classList.add("hide");nMsg.innerHTML="";}

  // Button
  const hOk=S.corner&&S.handling&&S.handling!=="Neutral";
  const gOk=S.track&&S.chip;
  const can=S.tab==="handling"?hOk:gOk;
  goBtn.disabled=!can;
  goBtn.textContent=S.show?"Update Recommendations":"Get Setup Advice";

  // Results
  if(!S.show){res.classList.add("hide");res.innerHTML="";return;}
  res.classList.remove("hide");

  let h='<div class="sep"></div><div class="sec-lbl">── Crew Chief Recommendations ──</div>';

  if(S.tab==="handling"&&hOk){
    const key=S.corner+"-"+S.handling;
    const adv=ADV[key];
    if(adv){
      const col=S.handling==="Loose"?"var(--red)":"var(--blue)";
      const ico=S.handling==="Loose"?"⚠️":"🔒";
      h+='<div class="card"><div class="card-hdr"><span style="font-size:20px">'+ico+'</span><h3 style="color:'+col+'">'+adv.title+'</h3></div>';
      adv.items.forEach((s,i)=>{
        h+='<div class="sug" style="animation:fadeIn .4s ease '+(i*.06)+'s both"><div style="display:flex;gap:10px;align-items:baseline;margin-bottom:4px"><span class="num">'+String(i+1).padStart(2,"0")+'</span><span class="adj">'+s.a+'</span></div><p class="tip">'+s.t+'</p></div>';
      });
      h+='</div>';
    }
  }

  if(S.tab==="gearing"&&gOk){
    const gd=gearAdv(S.track,S.chip);
    if(gd){
      const hard=S.chip==="Standing on it hard"||S.chip==="Locking up / sliding";
      h+='<div class="card"><div class="card-hdr"><span style="font-size:20px">⚙️</span><h3 style="color:var(--gold)">Gearing & Brake Strategy</h3></div>';
      h+='<div class="ibox" style="background:rgba(200,160,60,0.05);border:1px solid rgba(200,160,60,0.15)"><div class="il" style="color:var(--gold)">Rear End Ratio</div><p>'+gd.g+'</p></div>';
      if(gd.ch){
        const bg=hard?"rgba(220,80,40,0.06)":"var(--surface)";
        const bc=hard?"rgba(220,80,40,0.2)":"var(--border)";
        const lc=hard?"var(--red)":"var(--text-dim)";
        const lb=hard?"⚠️ Brake Warning":"Brake Strategy";
        h+='<div class="ibox" style="background:'+bg+';border:1px solid '+bc+'"><div class="il" style="color:'+lc+'">'+lb+'</div><p>'+gd.ch+'</p></div>';
      }
      h+='<div class="ibox" style="margin-top:12px;background:var(--surface);border:1px solid rgba(255,255,255,0.04)"><div class="il" style="color:var(--text-faint)">Quick Reference — LMS Specs</div><p style="color:#7a7668;font-size:12px">Rev limit: 7,200 RPM · 350ci V8 · 500 bhp · 450 lb-ft · No tachometer (shift by ear) · Upshift: lift throttle · Downshift: blip throttle · No clutch once rolling</p></div>';
      h+='</div>';
    }
  }

  h+='<details><summary>📋 Full LMS Adjustment List (from manual)</summary><div class="ref"><strong>Tires:</strong> Cold Air Pressure (LF, RF, LR, RR)<br><strong>Front Chassis:</strong> Ballast Forward, Nose Weight, Cross Weight, Steering Ratio, Steering Offset, Brake Balance Bar, Tape Config<br><strong>Front ARB:</strong> ARB Diameter, ARB Arm End, Attach Left Side, Preload<br><strong>Front Corners (LF/RF):</strong> Spring Perch Offset, Spring Rate, Bumpstop Rate, Packer, Bump Stiffness, Rebound Stiffness, Camber, Caster, Toe-in<br><strong>Rear Corners (LR/RR):</strong> Spring Perch Offset, Spring Rate, Bump Stiffness, Rebound Stiffness, Track Bar Height, Truck Arm Mount<br><strong>Rear:</strong> Fuel Fill To, Rear End Ratio, Truck Arm Preload<br><br><span style="color:var(--red)">NOT adjustable:</span> No rear sway bar · No rear camber · No rear caster · No rear toe</div></details>';

  h+='<button class="rst" onclick="resetAll()">Clear & Start Over</button>';
  h+='<p class="ftr">The Allison Crew Chief — iRacing Late Model Stocks — Manual V3 Verified</p>';
  res.innerHTML=h;
}

function resetAll(){S.corner="";S.handling="";S.track="";S.chip="";S.show=false;tSel.value="";render();window.scrollTo({top:0,behavior:"smooth"});}

render();

// ═══ PWA INSTALL ════════════════════════════════════════════
let dp;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dp=e;$("ib").classList.remove("hide")});
$("ib-btn").onclick=()=>{if(dp){dp.prompt();dp.userChoice.then(()=>{dp=null;$("ib").classList.add("hide")})}};
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
