<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="iRacing Late Model Stock Setup Advisor">
<title>The Allison Crew Chief</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏁</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#e82a1c;--red-dark:#b81e14;--gold:#d4a827;--blue:#2874c8;--green:#28a844;--bg:#0c0c0e;--carbon:rgba(255,255,255,0.015);--surface:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--text:#f0ece4;--text-dim:#9a958c;--text-faint:#6a665e}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--text)}

/* === BACKGROUND === */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:#0c0c0e}
/* Carbon fiber texture */
.bg::before{content:"";position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='6' height='6' viewBox='0 0 6 6' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='3' height='3' fill='rgba(255,255,255,0.02)'/%3E%3Crect x='3' y='3' width='3' height='3' fill='rgba(255,255,255,0.02)'/%3E%3C/svg%3E");opacity:.6}
/* Racing stripe left */
.bg .stripe-l{position:absolute;top:0;left:24px;width:4px;height:100%;background:linear-gradient(180deg,var(--red) 0%,rgba(232,42,28,0.1) 60%,transparent 100%)}
.bg .stripe-l2{position:absolute;top:0;left:32px;width:2px;height:100%;background:linear-gradient(180deg,var(--red) 0%,rgba(232,42,28,0.06) 50%,transparent 100%)}
/* Checkered corner */
.bg .checker{position:absolute;top:0;right:0;width:120px;height:120px;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='10' height='10' fill='white'/%3E%3Crect x='10' y='10' width='10' height='10' fill='white'/%3E%3C/svg%3E")}
/* Red glow top */
.bg .glow-r{position:absolute;top:-20%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(232,42,28,0.08) 0%,transparent 60%);border-radius:50%;filter:blur(80px)}
.bg .glow-g{position:absolute;bottom:-20%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(212,168,39,0.04) 0%,transparent 60%);border-radius:50%;filter:blur(60px)}

@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes rev{0%{transform:rotate(-130deg)}40%{transform:rotate(40deg)}70%{transform:rotate(-5deg)}100%{transform:rotate(15deg)}}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes rpmSweep{0%{width:0}50%{width:100%}100%{width:65%}}

.app{position:relative;z-index:1;min-height:100vh;padding:20px 16px env(safe-area-inset-bottom,40px);max-width:820px;margin:0 auto}

/* === HEADER === */
.hdr{text-align:center;margin-bottom:32px;animation:fadeIn .6s ease both;position:relative}
/* Checkered flag bar */
.hdr .flag-bar{height:6px;margin:0 -16px 20px;background-image:url("data:image/svg+xml,%3Csvg width='12' height='6' viewBox='0 0 12 6' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='6' height='6' fill='%23e8e4dc'/%3E%3Crect x='6' width='6' height='6' fill='%231a1a1a'/%3E%3C/svg%3E");background-size:12px 6px;opacity:.15}
.hdr .number{font-family:'Teko',sans-serif;font-size:80px;font-weight:700;line-height:.85;color:transparent;-webkit-text-stroke:2px rgba(232,42,28,0.2);letter-spacing:-2px;margin-bottom:-14px;user-select:none}
.ttl{font-family:'Teko',sans-serif;font-size:clamp(36px,8vw,56px);font-weight:700;letter-spacing:4px;text-transform:uppercase;line-height:.95;color:var(--text);position:relative;display:inline-block}
.ttl .accent{display:block;background:linear-gradient(90deg,var(--red) 0%,#ff4a38 50%,var(--red) 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
.sub{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--text-faint);margin-top:6px}
/* Red line under header */
.hdr .redline{height:3px;width:80px;margin:12px auto 0;background:linear-gradient(90deg,transparent,var(--red),transparent);border-radius:2px}
.hdr .manual-tag{display:inline-block;margin-top:10px;padding:3px 10px;border:1px solid rgba(232,42,28,0.2);border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(232,42,28,0.5)}

/* === RPM BAR === */
.rpm-bar{height:3px;margin:0 -16px 24px;background:rgba(255,255,255,0.03);position:relative;overflow:hidden}
.rpm-bar .fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--green),var(--gold) 50%,var(--red) 85%,#ff0000);animation:rpmSweep 2s ease-out both;border-radius:0 2px 2px 0}

/* === TABS === */
.tabs{display:flex;gap:0;margin-bottom:24px;animation:fadeIn .6s ease .1s both;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.tab{flex:1;padding:12px 16px;border:none;cursor:pointer;font-family:'Teko',sans-serif;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;background:var(--surface);color:var(--text-faint);transition:.2s;position:relative}
.tab.on{background:rgba(232,42,28,0.12);color:var(--red)}
.tab.on::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--red)}

/* === LABELS === */
.lbl{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-family:'Teko',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}
.lbl::before{content:"";width:3px;height:14px;background:var(--red);border-radius:1px}

/* === PILLS === */
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:10px 20px;border-radius:4px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#908a80;font-family:'Teko',sans-serif;font-size:16px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.2s;user-select:none;position:relative;overflow:hidden}
.pill:active{transform:scale(.96)}
.pill.on{background:rgba(212,168,39,0.12);border-color:var(--gold);color:var(--gold);box-shadow:0 0 12px rgba(212,168,39,0.1)}
.pill.loose.on{background:rgba(232,42,28,0.12);border-color:var(--red);color:var(--red);box-shadow:0 0 12px rgba(232,42,28,0.15)}
.pill.tight.on{background:rgba(40,116,200,0.12);border-color:var(--blue);color:var(--blue);box-shadow:0 0 12px rgba(40,116,200,0.1)}
.pill.neutral.on{background:rgba(40,168,68,0.12);border-color:var(--green);color:var(--green)}
.pill.sm{font-size:14px;padding:8px 14px}
/* Diagonal stripe on active pill */
.pill.on::before{content:"";position:absolute;top:0;right:0;width:20px;height:100%;background:linear-gradient(135deg,transparent 40%,currentColor 40%,currentColor 45%,transparent 45%);opacity:.08}

/* === SEVERITY === */
.sev-btn{padding:12px 16px;border-radius:4px;cursor:pointer;transition:.2s;display:flex;flex-direction:column;gap:3px;min-width:95px;user-select:none;position:relative;overflow:hidden}
.sev-btn:active{transform:scale(.96)}
.sev-btn .sl{font-family:'Teko',sans-serif;font-size:17px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.sev-btn .sd{font-family:'Rajdhani',sans-serif;font-size:11px;line-height:1.3;font-weight:400}

/* === SELECT === */
.sel{width:100%;padding:12px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:500;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23e8e4dc' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 16px center}.sel:focus{outline:0;border-color:var(--red);box-shadow:0 0 0 2px rgba(232,42,28,0.15)}.sel option{background:#141416;color:var(--text)}

/* === GO BUTTON === */
.go{width:100%;padding:16px;border:0;border-radius:4px;font-family:'Teko',sans-serif;font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:.3s;background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);color:white;margin-top:14px;box-shadow:0 4px 20px rgba(232,42,28,0.3);position:relative;overflow:hidden}
.go::before{content:"";position:absolute;top:0;left:0;right:0;bottom:0;background-image:url("data:image/svg+xml,%3Csvg width='12' height='6' viewBox='0 0 12 6' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='6' height='6' fill='rgba(255,255,255,0.05)'/%3E%3Crect x='6' width='6' height='6' fill='transparent'/%3E%3C/svg%3E");background-size:12px 6px;opacity:.4}
.go:disabled{opacity:.25;cursor:not-allowed;box-shadow:none}
.go:active:not(:disabled){transform:scale(.98);box-shadow:0 2px 10px rgba(232,42,28,0.4)}

.rst{width:100%;padding:12px;border:1px solid rgba(255,255,255,0.1);border-radius:4px;background:0;font-family:'Teko',sans-serif;font-size:15px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);cursor:pointer}

/* === CARDS === */
.card{margin-bottom:20px;padding:20px 16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;position:relative;overflow:hidden}
/* Carbon fiber texture on cards */
.card::before{content:"";position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='6' height='6' viewBox='0 0 6 6' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='3' height='3' fill='rgba(255,255,255,0.01)'/%3E%3Crect x='3' y='3' width='3' height='3' fill='rgba(255,255,255,0.01)'/%3E%3C/svg%3E");pointer-events:none}
/* Red left border accent */
.card::after{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:var(--red);border-radius:3px 0 0 3px}
.card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:6px;position:relative;z-index:1}
.card-hdr h3{font-family:'Teko',sans-serif;font-size:22px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}

.sev-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:3px;margin-bottom:14px;position:relative;z-index:1}
.sev-badge span{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.intro-text{color:#9a9688;font-size:14px;line-height:1.6;margin-bottom:14px;font-style:italic;position:relative;z-index:1;border-left:2px solid rgba(255,255,255,0.06);padding-left:12px}

.sug{padding:14px 16px;margin-bottom:8px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.05);border-radius:4px;transition:.25s;position:relative;z-index:1}
.sug:active,.sug:hover{background:rgba(232,42,28,0.05);border-color:rgba(232,42,28,0.2)}
.sug .num{color:var(--red);font-family:'Teko',sans-serif;font-size:16px;font-weight:700;min-width:24px;opacity:.6}
.sug .adj{color:var(--text);font-family:'Teko',sans-serif;font-size:17px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.sug .tip{color:#a8a49a;font-size:13px;line-height:1.65;margin-left:34px;margin-top:4px;font-family:'Rajdhani',sans-serif}

.ibox{padding:14px 16px;border-radius:4px;margin-bottom:10px;position:relative;z-index:1}
.ibox .il{font-family:'Teko',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.ibox p{color:#d4d0c8;font-size:14px;line-height:1.6;font-family:'Rajdhani',sans-serif;font-weight:500}

.nbox{padding:18px 20px;border-radius:6px;background:rgba(40,168,68,0.06);border:1px solid rgba(40,168,68,0.2);border-left:3px solid var(--green)}
.nbox h4{font-family:'Teko',sans-serif;font-size:18px;font-weight:600;letter-spacing:1.5px;color:var(--green);display:flex;align-items:center;gap:8px;margin-bottom:8px;text-transform:uppercase}
.nbox p{color:var(--text-dim);font-size:14px;line-height:1.6;font-family:'Rajdhani',sans-serif}

.sep{width:100%;height:1px;margin:16px 0 20px;background:linear-gradient(90deg,var(--red),rgba(232,42,28,0.3),transparent)}
.sec-lbl{font-family:'Teko',sans-serif;font-size:16px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--red);margin-bottom:20px;text-align:center;display:flex;align-items:center;justify-content:center;gap:12px}
.sec-lbl::before,.sec-lbl::after{content:"";flex:1;height:1px;max-width:60px;background:linear-gradient(90deg,transparent,rgba(232,42,28,0.3))}
.sec-lbl::after{background:linear-gradient(270deg,transparent,rgba(232,42,28,0.3))}

details{margin-bottom:20px}
details summary{font-family:'Teko',sans-serif;font-size:14px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);cursor:pointer;padding:12px 0}
details .ref{padding:16px;background:var(--surface);border:1px solid rgba(255,255,255,0.04);border-radius:4px;font-size:13px;color:#7a7668;line-height:1.8;font-family:'Rajdhani',sans-serif;font-weight:500}
details .ref strong{color:var(--text-dim)}

.ftr{text-align:center;margin-top:24px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#2a2820}
/* Checkered footer bar */
.ftr-bar{height:6px;margin:20px -16px 0;background-image:url("data:image/svg+xml,%3Csvg width='12' height='6' viewBox='0 0 12 6' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='6' height='6' fill='%23e8e4dc'/%3E%3Crect x='6' width='6' height='6' fill='%231a1a1a'/%3E%3C/svg%3E");background-size:12px 6px;opacity:.1}

.gap{margin-bottom:22px}.hide{display:none!important}
.ibanner{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:16px;background:linear-gradient(180deg,transparent,#0c0c0e 30%)}
.ibtn{display:block;width:100%;max-width:400px;margin:0 auto;padding:14px;border:1px solid rgba(232,42,28,0.4);border-radius:4px;background:rgba(232,42,28,0.1);font-family:'Teko',sans-serif;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--red);cursor:pointer;text-align:center}
</style>
</head>
<body>
<div class="bg">
  <div class="stripe-l"></div><div class="stripe-l2"></div>
  <div class="checker"></div>
  <div class="glow-r"></div><div class="glow-g"></div>
</div>
<div class="app" id="app">
<div class="hdr">
  <div class="flag-bar"></div>
  <div class="number">45</div>
  <h1 class="ttl">THE <span class="accent">ALLISON</span> CREW CHIEF</h1>
  <p class="sub">iRacing Late Model Stock · Setup Advisor</p>
  <div class="redline"></div>
  <div class="manual-tag">Manual V3 Verified</div>
</div>
<div class="rpm-bar"><div class="fill"></div></div>
<div class="tabs"><button class="tab on" data-t="handling">Handling</button><button class="tab" data-t="gearing">Gearing & Brakes</button></div>
<div id="p-handling">
<div class="gap"><label class="lbl">Where in the corner?</label><div class="pills" id="corner-pills"></div></div>
<div class="gap"><label class="lbl">How's the car handling?</label><div class="pills" id="handling-pills"></div></div>
<div id="sev-section" class="hide"><div class="gap"><label class="lbl">How bad is it?</label><div class="pills" id="sev-pills"></div></div></div>
<div id="neutral-msg" class="hide"></div>
</div>
<div id="p-gearing" class="hide">
<div class="gap"><label class="lbl">Select Track</label><select class="sel" id="track-sel"><option value="">Choose a track...</option></select></div>
<div class="gap"><label class="lbl">How hard on the chip?</label><div class="pills" id="chip-pills"></div></div>
</div>
<button class="go" id="go-btn" disabled>🏁 Get Setup Advice</button>
<div id="results" class="hide"></div>
</div>
<div class="ibanner hide" id="ib"><button class="ibtn" id="ib-btn">📲 Install to Home Screen</button></div>
<script>
const TRACKS=[{n:"Bristol Motor Speedway",l:.533,t:"short",c:"Very hard on chip — heavy braking, tight paperclip corners"},{n:"Charlotte Motor Speedway",l:1.5,t:"intermediate",c:"Moderate chip, lift-and-coast through center"},{n:"Darlington Raceway",l:1.366,t:"intermediate",c:"Asymmetric — harder on chip in turns 3-4"},{n:"Daytona International Speedway",l:2.5,t:"superspeedway",c:"Minimal chip usage, WOT most of the lap"},{n:"Dover Motor Speedway",l:1.0,t:"short",c:"Concrete surface, moderate chip"},{n:"Five Flags Speedway",l:.5,t:"short",c:"Tight half-mile, moderate-heavy chip"},{n:"Hickory Motor Speedway",l:.363,t:"short",c:"Very tight bullring, heavy chip"},{n:"Homestead-Miami Speedway",l:1.5,t:"intermediate",c:"Progressive banking, light chip"},{n:"Iowa Speedway",l:.875,t:"short",c:"Moderate chip, short track feel"},{n:"Irwindale Speedway",l:.5,t:"short",c:"Half-mile, moderate chip"},{n:"Kansas Speedway",l:1.5,t:"intermediate",c:"Moderate chip, progressive banking helps"},{n:"Langley Speedway",l:.395,t:"short",c:"Tight bullring, heavy chip usage"},{n:"Las Vegas Motor Speedway",l:1.5,t:"intermediate",c:"Light chip, flat corners"},{n:"Martinsville Speedway",l:.526,t:"short",c:"Extremely hard on chip — heavy braking paperclip"},{n:"Michigan International Speedway",l:2.0,t:"superspeedway",c:"Light chip, high speed sweepers"},{n:"New Hampshire Motor Speedway",l:1.058,t:"short",c:"Flat track, moderate-heavy chip"},{n:"North Wilkesboro Speedway",l:.625,t:"short",c:"Uphill/downhill, moderate chip"},{n:"Phoenix Raceway",l:1.0,t:"short",c:"Dogleg adds chip usage, moderate"},{n:"Pocono Raceway",l:2.5,t:"superspeedway",c:"Three unique turns — heavy chip in Tunnel Turn"},{n:"Richmond Raceway",l:.75,t:"short",c:"D-shaped, moderate chip"},{n:"Rockingham Speedway",l:1.017,t:"short",c:"Narrow groove, moderate chip"},{n:"South Boston Speedway",l:.4,t:"short",c:"Tight bullring, heavy braking"},{n:"Southern National Motorsports Park",l:.4,t:"short",c:"Tight 4/10 mile, heavy chip"},{n:"Talladega Superspeedway",l:2.66,t:"superspeedway",c:"Minimal chip, drafting track"},{n:"Texas Motor Speedway",l:1.5,t:"intermediate",c:"Repaved — light chip, high grip"}];
const SEV={mild:{icon:"🟡",color:"#d4a827",desc:"Slightly off — just needs a nudge"},moderate:{icon:"🟠",color:"#e07020",desc:"Noticeable — costing you time"},severe:{icon:"🔴",color:"#e8281c",desc:"Undriveable — can't hold the car"}};
const ADV={"Entry-Loose":{title:"Loose on Entry",mild:{intro:"Just a slight wiggle on turn-in. One small change:",items:[{a:"Brake Balance Bar",t:"Increase by 0.5–1% (more front bias). Keeps front loaded so the rear doesn't step out."},{a:"Rear Rebound Stiffness",t:"Increase by 1-2 clicks — holds the rear during braking-to-turn-in transition."}]},moderate:{intro:"Rear stepping out noticeably. Combine 2-3 of these:",items:[{a:"Brake Balance Bar",t:"Increase by 1–2% (more front bias) to keep weight forward under braking."},{a:"Front Bump Stiffness",t:"Increase by 2-3 clicks — tightens under braking by slowing front compression."},{a:"Cross Weight",t:"Increase slightly — adds weight to LR & RF diagonal, planting the rear."},{a:"RF Packer",t:"Add a small RF packer — shifts weight to RF sooner on entry, stabilizing."}]},severe:{intro:"Car is spinning or nearly spinning on entry. Work through these in order:",items:[{a:"Brake Balance Bar",t:"Increase by 2-3% toward front. Need significantly more front braking force."},{a:"Cross Weight",t:"Increase by 0.5–1.0% — shift diagonal weight to tighten the rear."},{a:"Front Bump Stiffness",t:"Increase by 3-5 clicks — resist front dive so rear doesn't unload violently."},{a:"Rear Rebound Stiffness",t:"Increase by 3-4 clicks — physically holds the rear down."},{a:"LR Track Bar Height",t:"Lower the left-side mount — increases LR grip directly."},{a:"Nose Weight / Ballast Forward",t:"Move ballast forward — more front weight stops the rear from swinging."},{a:"Front Caster Split",t:"Reduce LF-to-RF caster split — less aggressive corner pull."}]}},
"Entry-Tight":{title:"Tight on Entry",mild:{intro:"Car is just a little lazy turning in. One small tweak:",items:[{a:"Brake Balance Bar",t:"Decrease by 0.5–1% (more rear bias) to help rotation."},{a:"Front Bump Stiffness",t:"Decrease by 1-2 clicks — lets front load faster for better bite."}]},moderate:{intro:"Pushing through entry, losing time. Combine a few:",items:[{a:"Brake Balance Bar",t:"Decrease by 1–2% for more rear braking force and rotation."},{a:"Front Bump Stiffness",t:"Decrease by 2-3 clicks — lets front dive and load faster."},{a:"Rear Rebound Stiffness",t:"Decrease RR rebound by 2-3 clicks — frees rear for rotation."},{a:"LF Packer",t:"Add LF packer — loosens entry and reduces front bar load."}]},severe:{intro:"Car is plowing straight — won't turn at all. Major changes:",items:[{a:"Brake Balance Bar",t:"Decrease by 2-3% toward rear for significant rotation."},{a:"Cross Weight",t:"Decrease by 0.5–1.0% — shifts weight to LF/RR diagonal."},{a:"Front Bump Stiffness",t:"Decrease by 3-5 clicks — let front dive to plant front tires."},{a:"Rear Rebound Stiffness",t:"Decrease by 3-4 clicks, especially RR."},{a:"LR Track Bar Height",t:"Raise left-side mount — helps car rotate into corner."},{a:"Nose Weight / Ballast Forward",t:"Move ballast rearward — less front weight lets nose bite."},{a:"Front Caster Split",t:"Run less caster on LF than RF — enters more aggressively."}]}},
"Center-Loose":{title:"Loose in Center",mild:{intro:"Slight drift through the middle. Small tweak will settle it:",items:[{a:"Cross Weight",t:"Increase slightly — more LR/RF diagonal weight tightens center."},{a:"Rear Bump Stiffness",t:"Increase by 1-2 clicks — adds stability through sustained cornering."}]},moderate:{intro:"Rear sliding through center, scrubbing speed. Try combining:",items:[{a:"Cross Weight",t:"Increase by 0.3–0.5% — plants the rear mid-corner."},{a:"RR Spring Rate",t:"Increase — stiffer RR compensates for no rear ARB."},{a:"Track Bar Height (both)",t:"Lower both mounts — tightens the chassis while cornering."},{a:"Tire Pressures",t:"Lower RR cold pressure by 0.5–1 psi for more grip."}]},severe:{intro:"Completely sideways through center. Major work needed:",items:[{a:"Cross Weight",t:"Increase by 0.5–1.0% — biggest lever for center tightness."},{a:"RR Spring Rate",t:"Increase significantly — main rear roll resistance without rear ARB."},{a:"Track Bar Height (both)",t:"Lower both mounts — tightens entire cornering phase."},{a:"Rear Bump Stiffness",t:"Increase by 3-5 clicks for more stability."},{a:"Front ARB Diameter",t:"Decrease — lets front grip better, balancing loose rear."},{a:"Tire Pressures",t:"Lower RR by 1-2 psi AND raise LF to shift grip balance."},{a:"RF Bumpstop Rate",t:"Soften — more front mechanical grip through the arc."}]}},
"Center-Tight":{title:"Tight in Center",mild:{intro:"Reluctant to rotate mid-corner. One adjustment:",items:[{a:"Cross Weight",t:"Decrease slightly — shifts weight to LF/RR diagonal."},{a:"Rear Bump Stiffness",t:"Decrease by 1-2 clicks — rear moves more freely."}]},moderate:{intro:"Pushing through center, waiting on throttle. Combine a few:",items:[{a:"Cross Weight",t:"Decrease by 0.3–0.5% — lower values shift weight to LF/RR."},{a:"Track Bar Height (both)",t:"Raise both mounts — frees chassis through all cornering."},{a:"RR Spring Rate",t:"Soften — more rear rotation. LR/RR split controls roll."},{a:"Tire Pressures",t:"Lower front cold pressures by 0.5–1 psi."}]},severe:{intro:"Car won't turn through center — scrubbing massive speed:",items:[{a:"Cross Weight",t:"Decrease by 0.5–1.0% — strongest tool for freeing center."},{a:"Track Bar Height (both)",t:"Raise both mounts significantly."},{a:"RR Spring Rate",t:"Soften significantly — let rear roll and rotate."},{a:"Front ARB Diameter",t:"Increase — more front roll stiffness helps rear come around."},{a:"Rear Bump Stiffness",t:"Decrease by 3-5 clicks."},{a:"Tire Pressures",t:"Lower front by 1-2 psi AND raise RR by 0.5-1 psi."},{a:"Corner Weight Tuning",t:"Adjust spring perch offsets to shift weight to LF/RR."}]}},
"Exit-Loose":{title:"Loose on Exit",mild:{intro:"Slight step-out on throttle. Easy fix:",items:[{a:"Rear Bump Stiffness",t:"Increase by 1-2 clicks — tightens under acceleration."},{a:"Tire Pressures",t:"Lower RR cold pressure by 0.5 psi."}]},moderate:{intro:"Rear sliding on throttle, can't get to full power. Combine:",items:[{a:"Rear Bump Stiffness",t:"Increase by 2-3 clicks."},{a:"Cross Weight",t:"Increase — more LR weight for on-throttle traction."},{a:"Front Rebound Stiffness (LF)",t:"Increase LF rebound by 2-3 clicks."},{a:"Tire Pressures",t:"Lower LR/RR cold pressures by 0.5–1 psi."}]},severe:{intro:"Spinning tires or swinging rear on exit. Big changes needed:",items:[{a:"Rear Bump Stiffness",t:"Increase by 4-6 clicks."},{a:"Cross Weight",t:"Increase by 0.5–1.0% — more LR weight for traction."},{a:"RR Spring Rate",t:"Increase — stiffer RR plants rear. Compensates for no rear ARB."},{a:"Front Rebound Stiffness (LF)",t:"Increase LF rebound by 3-5 clicks."},{a:"RR Track Bar Height",t:"Lower right-side mount — increases grip on that tire."},{a:"Truck Arm Mount",t:"Lower — increases rear end bite, reduces rear steer."},{a:"Tire Pressures",t:"Lower LR and RR by 1-2 psi."}]}},
"Exit-Tight":{title:"Tight on Exit",mild:{intro:"Touch tight off the corner. Small change:",items:[{a:"Rear Bump Stiffness",t:"Decrease by 1-2 clicks — loosens under acceleration."},{a:"Front Rebound Stiffness (RF)",t:"Increase RF rebound by 1-2 clicks — frees exit."}]},moderate:{intro:"Won't rotate off the corner, losing drive. Combine:",items:[{a:"Rear Bump Stiffness",t:"Decrease by 2-3 clicks."},{a:"Cross Weight",t:"Decrease — less LR/RF diagonal weight."},{a:"Front Rebound Stiffness (RF)",t:"Increase RF rebound by 2-3 clicks."},{a:"RR Track Bar Height",t:"Raise right-side mount — reduces RR grip center to exit."}]},severe:{intro:"Car won't drive off the corner — bogging and pushing. Major:",items:[{a:"Rear Bump Stiffness",t:"Decrease by 4-6 clicks."},{a:"Cross Weight",t:"Decrease by 0.5–1.0%."},{a:"RR Track Bar Height",t:"Raise right-side mount — frees center to exit."},{a:"RR Spring Rate",t:"Soften significantly."},{a:"Front Rebound Stiffness (RF)",t:"Increase RF rebound by 3-5 clicks."},{a:"Truck Arm Mount",t:"Raise — reduces rear grip, more rear steer."},{a:"Tire Pressures",t:"Raise rear cold pressures by 1-2 psi."}]}}};

let S={tab:"handling",corner:"",handling:"",sev:"",track:"",chip:"",show:false};
const $=id=>document.getElementById(id);
function mkPills(el,items,grp,cls){el.innerHTML="";items.forEach(v=>{const b=document.createElement("button");b.className="pill"+(cls?" "+cls:"");if(grp==="handling"){b.textContent=({Loose:"🔥 ",Tight:"🧊 ",Neutral:"✅ "}[v]||"")+v;b.classList.add(v.toLowerCase())}else b.textContent=v;b.dataset.v=v;b.onclick=()=>{if(grp==="corner"){S.corner=v;S.sev=""}else if(grp==="handling"){S.handling=v;S.sev=""}else if(grp==="chip")S.chip=v;S.show=false;render()};el.appendChild(b)})}
function mkSev(){const el=$("sev-pills");el.innerHTML="";["mild","moderate","severe"].forEach(v=>{const s=SEV[v],b=document.createElement("button");b.className="sev-btn";b.dataset.v=v;b.innerHTML='<span class="sl">'+s.icon+" "+v+'</span><span class="sd">'+s.desc+'</span>';b.onclick=()=>{S.sev=v;S.show=false;render()};el.appendChild(b)})}
TRACKS.forEach(t=>{const o=document.createElement("option");o.value=t.n;o.textContent=t.n+" ("+t.l+" mi)";$("track-sel").appendChild(o)});
$("track-sel").onchange=e=>{S.track=e.target.value;S.show=false;render()};
mkPills($("corner-pills"),["Entry","Center","Exit"],"corner");mkPills($("handling-pills"),["Loose","Tight","Neutral"],"handling");mkPills($("chip-pills"),["Barely touching it","Moderate pressure","Standing on it hard","Locking up / sliding"],"chip","sm");mkSev();
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{S.tab=b.dataset.t;S.show=false;render()});
$("go-btn").onclick=()=>{S.show=true;render();setTimeout(()=>$("results").scrollIntoView({behavior:"smooth"}),100)};

function gearAdv(tn,cl){const t=TRACKS.find(x=>x.n===tn);if(!t)return null;let g="",ch="",rpm="7,200";if(t.t==="superspeedway")g=t.n+" — drafting track. Taller ratio (~3.00–3.40) for top speed. Hit "+rpm+" RPM before braking.";else if(t.t==="intermediate")g="Intermediate at "+t.n+": Ratio ~3.40–3.80. Hit "+rpm+" RPM before braking. Shift by ear.";else g="Short track at "+t.n+": Shorter ratio (~4.00–5.00+) for exit acceleration. Hit "+rpm+" RPM before braking.";if(cl==="Standing on it hard"||cl==="Locking up / sliding"){const lk=cl==="Locking up / sliding";ch="Overworking the brakes"+(lk?" — locking up":"")+". At "+t.n+", "+t.c.toLowerCase()+". Brake Balance Bar: locking fronts=decrease, locking rears=increase. Over 50%=more front. "+(lk?"Reduce total pressure.":"Ease off earlier.");if(t.t==="short")ch+=" Downshift earlier for engine braking."}else if(cl==="Moderate pressure")ch="Good middle ground. At "+t.n+", "+t.c.toLowerCase()+". Brake Balance Bar: higher=tighter, lower=looser under braking.";else if(cl==="Barely touching it"){ch="Light braking at "+t.n+". "+t.c+". Harder initial hit with smooth trail-off improves rotation. "+(t.t==="short"?"Short tracks usually need more brake.":"Bigger tracks: this may be fine.")}return{g,ch}}

function render(){
document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.t===S.tab));
$("p-handling").classList.toggle("hide",S.tab!=="handling");$("p-gearing").classList.toggle("hide",S.tab!=="gearing");
$("corner-pills").querySelectorAll(".pill").forEach(p=>p.classList.toggle("on",p.dataset.v===S.corner));
$("handling-pills").querySelectorAll(".pill").forEach(p=>p.classList.toggle("on",p.dataset.v===S.handling));
$("chip-pills").querySelectorAll(".pill").forEach(p=>p.classList.toggle("on",p.dataset.v===S.chip));
const showSev=S.corner&&S.handling&&S.handling!=="Neutral";
$("sev-section").classList.toggle("hide",!showSev);
$("sev-pills").querySelectorAll(".sev-btn").forEach(b=>{const v=b.dataset.v,s=SEV[v],on=S.sev===v;b.style.border="1px solid "+(on?s.color:"rgba(255,255,255,0.1)");b.style.background=on?s.color+"18":"rgba(255,255,255,0.03)";b.querySelector(".sl").style.color=on?s.color:"#908a80";b.querySelector(".sd").style.color=on?s.color+"cc":"var(--text-faint)"});
if(S.handling==="Neutral"&&S.corner){$("neutral-msg").classList.remove("hide");$("neutral-msg").innerHTML='<div class="nbox"><h4>✅ CAR IS BALANCED</h4><p>Neutral on '+S.corner.toLowerCase()+'? You\'re in the zone. Smooth hands, progressive throttle, consistent braking. Shift by ear before 7,200 RPM.</p></div>'}else{$("neutral-msg").classList.add("hide");$("neutral-msg").innerHTML=""}
const hOk=S.corner&&S.handling&&S.handling!=="Neutral"&&S.sev,gOk=S.track&&S.chip,can=S.tab==="handling"?hOk:gOk;
$("go-btn").disabled=!can;$("go-btn").textContent=S.show?"🏁 Update Recommendations":"🏁 Get Setup Advice";
if(!S.show){$("results").classList.add("hide");$("results").innerHTML="";return}
$("results").classList.remove("hide");
let h='<div class="sep"></div><div class="sec-lbl">Crew Chief Says</div>';
if(S.tab==="handling"&&hOk){const key=S.corner+"-"+S.handling,grp=ADV[key];if(grp){const adv=grp[S.sev],col=S.handling==="Loose"?"var(--red)":"var(--blue)",ico=S.handling==="Loose"?"⚠️":"🔒",sv=SEV[S.sev];h+='<div class="card"><div class="card-hdr"><span style="font-size:20px">'+ico+'</span><h3 style="color:'+col+'">'+grp.title+'</h3></div><div class="sev-badge" style="background:'+sv.color+'15;border:1px solid '+sv.color+'40"><span style="font-size:12px">'+sv.icon+'</span><span style="color:'+sv.color+'">'+S.sev+' severity</span></div><p class="intro-text">'+adv.intro+'</p>';adv.items.forEach((s,i)=>{h+='<div class="sug" style="animation:fadeIn .4s ease '+(i*.06)+'s both"><div style="display:flex;gap:10px;align-items:baseline;margin-bottom:4px"><span class="num">'+String(i+1).padStart(2,"0")+'</span><span class="adj">'+s.a+'</span></div><p class="tip">'+s.t+'</p></div>'});h+='</div>'}}
if(S.tab==="gearing"&&gOk){const gd=gearAdv(S.track,S.chip);if(gd){const hard=S.chip==="Standing on it hard"||S.chip==="Locking up / sliding";h+='<div class="card"><div class="card-hdr"><span style="font-size:20px">⚙️</span><h3 style="color:var(--gold)">Gearing & Brake Strategy</h3></div><div class="ibox" style="background:rgba(212,168,39,0.05);border:1px solid rgba(212,168,39,0.15)"><div class="il" style="color:var(--gold)">Rear End Ratio</div><p>'+gd.g+'</p></div>';if(gd.ch)h+='<div class="ibox" style="background:'+(hard?"rgba(232,42,28,0.06)":"var(--surface)")+';border:1px solid '+(hard?"rgba(232,42,28,0.2)":"var(--border)")+'"><div class="il" style="color:'+(hard?"var(--red)":"var(--text-dim)")+'">'+(hard?"⚠️ Brake Warning":"Brake Strategy")+'</div><p>'+gd.ch+'</p></div>';h+='<div class="ibox" style="margin-top:12px;background:var(--surface);border:1px solid rgba(255,255,255,0.04)"><div class="il" style="color:var(--text-faint)">Quick Reference</div><p style="color:#7a7668;font-size:13px">Rev limit: 7,200 RPM · 350ci V8 · 500 bhp · 450 lb-ft · No tach · Upshift: lift · Downshift: blip · No clutch once rolling</p></div></div>'}}
h+='<details><summary>📋 Full LMS Adjustment List</summary><div class="ref"><strong>Tires:</strong> Cold Pressure (LF, RF, LR, RR)<br><strong>Front:</strong> Ballast Forward, Nose Weight, Cross Weight, Steering Ratio/Offset, Brake Balance Bar, Tape Config<br><strong>Front ARB:</strong> Diameter, Arm End, Attach Left Side, Preload<br><strong>Front Corners:</strong> Spring Perch Offset, Spring Rate, Bumpstop, Packer, Bump/Rebound Stiffness, Camber, Caster, Toe-in<br><strong>Rear Corners:</strong> Spring Perch Offset, Spring Rate, Bump/Rebound Stiffness, Track Bar Height, Truck Arm Mount<br><strong>Rear:</strong> Fuel Fill, Rear End Ratio, Truck Arm Preload<br><br><span style="color:var(--red)">NOT adjustable:</span> No rear sway bar · No rear camber · No rear caster · No rear toe</div></details>';
h+='<button class="rst" onclick="resetAll()">Clear & Start Over</button><p class="ftr">The Allison Crew Chief · Late Model Stock</p><div class="ftr-bar"></div>';
$("results").innerHTML=h}
function resetAll(){S={tab:S.tab,corner:"",handling:"",sev:"",track:"",chip:"",show:false};$("track-sel").value="";render();window.scrollTo({top:0,behavior:"smooth"})}
render();
let dp;window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dp=e;$("ib").classList.remove("hide")});$("ib-btn").onclick=()=>{if(dp){dp.prompt();dp.userChoice.then(()=>{dp=null;$("ib").classList.add("hide")})}};if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
