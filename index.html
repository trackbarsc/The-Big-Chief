<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">
<meta name="description" content="iRacing Setup Advisor — Late Model Stock, Street Stock, Mini Stock">
<title>The Big Chief - Powered by Allison Racing</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏁</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#cc0000;--red-bright:#ff1a1a;--red-dark:#880000;
  --white:#f0f0f0;--grey:#888;--grey-dark:#444;--grey-dim:#2a2a2a;
  --bg:#080808;--card:#0f0f12;--card-lit:#161619;
  --border:#1a1a1e;--border-lit:#2a2a30;
  --text:#eee;--text-mid:#999;--text-dim:#555;
  --r:6px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--text)}

/* ═══ BACKGROUND ═══ */
.bg{position:fixed;inset:0;z-index:0;background:var(--bg)}
.bg::before{content:"";position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='6' height='6' viewBox='0 0 6 6' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='3' height='3' fill='%230b0b0b'/%3E%3Crect x='3' y='3' width='3' height='3' fill='%230b0b0b'/%3E%3Crect x='3' width='3' height='3' fill='%230c0c0c'/%3E%3Crect y='3' width='3' height='3' fill='%230c0c0c'/%3E%3C/svg%3E");background-size:6px 6px}
.bg .stripe{position:absolute;top:0;bottom:0;left:14px;width:5px;background:linear-gradient(180deg,var(--red),rgba(204,0,0,0.15) 50%,transparent);z-index:1}
.bg .stripe2{position:absolute;top:0;bottom:0;left:23px;width:2px;background:linear-gradient(180deg,var(--red),rgba(204,0,0,0.08) 40%,transparent);z-index:1}
.bg .glow{position:absolute;top:-15%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(204,0,0,0.05) 0%,transparent 50%);border-radius:50%;filter:blur(60px)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes needleSweep{0%{transform:rotate(-130deg)}40%{transform:rotate(55deg)}65%{transform:rotate(10deg)}85%{transform:rotate(30deg)}100%{transform:rotate(15deg)}}
@keyframes needleSettle{from{opacity:0}to{opacity:1}}
@keyframes pulseRed{0%,100%{box-shadow:0 0 10px rgba(204,0,0,0.15)}50%{box-shadow:0 0 22px rgba(204,0,0,0.35)}}
@keyframes goBreathe{0%,100%{box-shadow:0 4px 20px rgba(204,0,0,0.25)}50%{box-shadow:0 6px 30px rgba(204,0,0,0.45)}}
@keyframes silhouetteFade{from{opacity:0}to{opacity:.03}}

.app{position:relative;z-index:1;min-height:100vh;padding:0 14px env(safe-area-inset-bottom,40px);max-width:800px;margin:0 auto}

/* ═══ HEADER — angular racing frame ═══ */
.hdr{position:relative;margin-bottom:10px;animation:fadeUp .5s ease both;overflow:hidden}
/* Checkered top strip */
.hdr .chk-top{height:8px;margin:0 -14px;background-image:url("data:image/svg+xml,%3Csvg width='16' height='8' viewBox='0 0 16 8' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='8' height='8' fill='%23ccc'/%3E%3Crect x='8' width='8' height='8' fill='%23111'/%3E%3C/svg%3E");background-size:16px 8px;opacity:.2}
/* Red angular bar */
.hdr .red-bar{height:4px;margin:0 -14px;background:var(--red);box-shadow:0 2px 12px rgba(204,0,0,0.4)}
.hdr .logo-wrap{text-align:center;padding:16px 0 8px;position:relative}
/* Angled corner accents */
.hdr .logo-wrap::before{content:"";position:absolute;top:10px;left:0;width:40px;height:40px;border-left:3px solid var(--red);border-top:3px solid var(--red)}
.hdr .logo-wrap::after{content:"";position:absolute;top:10px;right:0;width:40px;height:40px;border-right:3px solid var(--red);border-top:3px solid var(--red)}
.sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--text-dim);margin-top:4px;text-align:center}
.hdr .tag-row{display:flex;justify-content:center;gap:12px;margin-top:10px}
.hdr .tag{padding:3px 12px;border:1px solid var(--red);font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--red)}

/* ═══ TACHOMETER ═══ */
.tach-wrap{display:flex;justify-content:center;margin:8px 0 12px;animation:fadeUp .5s ease .1s both}
.tach{position:relative;width:160px;height:90px;overflow:hidden}
.tach svg{width:160px;height:90px}
.tach .needle{transform-origin:80px 80px;animation:needleSweep 2s cubic-bezier(.2,.8,.3,1) both}
.tach .rpm-text{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-family:'Russo One',sans-serif;font-size:11px;color:var(--red);letter-spacing:2px}

/* ═══ CAR SILHOUETTE ═══ */
.silhouette{position:fixed;bottom:10%;right:-5%;z-index:0;opacity:.03;pointer-events:none;animation:silhouetteFade 2s ease 1s both}
.silhouette svg{width:400px;height:auto}

/* ═══ CAR SELECTOR ═══ */
.car-sel{display:flex;gap:4px;margin-bottom:12px;animation:fadeUp .5s ease .15s both}
.car-btn{flex:1;padding:12px 6px;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;background:var(--card);color:var(--text-dim);transition:all .2s ease;text-align:center;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%)}
.car-btn:active{transform:scale(.96)}
.car-btn.on{background:linear-gradient(180deg,#1a0000,var(--card));color:var(--white);border-bottom-color:var(--red)}

/* ═══ TABS ═══ */
.tabs{display:flex;gap:3px;margin-bottom:18px;animation:fadeUp .5s ease .2s both}
.tab{flex:1;padding:12px 6px;border:none;border-left:3px solid transparent;cursor:pointer;font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--card);color:var(--text-dim);transition:all .2s ease;text-align:center;position:relative}
.tab:active{transform:scale(.96)}
.tab.on{color:var(--white);border-left-color:var(--red);background:linear-gradient(90deg,rgba(204,0,0,0.1),var(--card))}
.tab.on::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--red),transparent)}

/* ═══ LABELS ═══ */
.lbl{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--grey)}
.lbl::before{content:"";width:12px;height:2px;background:var(--red)}

/* ═══ PILLS ═══ */
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:12px 20px;border:none;border-bottom:3px solid transparent;background:var(--card);color:var(--text-dim);font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s ease;user-select:none;position:relative;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.pill:active{transform:scale(.94)}
.pill.on{color:var(--white);border-bottom-color:var(--white);background:var(--card-lit)}
.pill.loose.on{color:var(--red-bright);border-bottom-color:var(--red);background:linear-gradient(180deg,rgba(204,0,0,0.12),var(--card))}
.pill.tight.on{color:var(--white);border-bottom-color:var(--white);background:linear-gradient(180deg,rgba(255,255,255,0.06),var(--card))}
.pill.neutral.on{color:var(--grey);border-bottom-color:var(--grey);background:var(--card-lit)}
.pill.sm{font-size:13px;padding:10px 14px}

/* ═══ SEVERITY ═══ */
.sev-btn{padding:12px 14px;cursor:pointer;transition:all .2s ease;display:flex;flex-direction:column;gap:3px;min-width:85px;user-select:none;border:none;border-left:3px solid transparent;background:var(--card)}
.sev-btn:active{transform:scale(.94)}
.sev-btn .sl{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.sev-btn .sd{font-family:'Rajdhani',sans-serif;font-size:10px;line-height:1.3;font-weight:500}

/* ═══ SELECT ═══ */
.sel{width:100%;padding:12px 16px;background:var(--card);border:none;border-left:3px solid var(--red);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 5 5-5' stroke='%23cc0000' stroke-width='2' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 16px center;transition:all .2s ease}
.sel:focus{outline:0;box-shadow:inset 0 0 0 1px var(--red)}
.sel option{background:var(--card);color:var(--text)}

/* ═══ GO BUTTON ═══ */
.go{width:100%;padding:18px;border:none;font-family:'Russo One',sans-serif;font-size:18px;letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:all .2s ease;background:var(--red);color:white;margin-top:12px;position:relative;overflow:hidden;animation:goBreathe 2.5s ease-in-out infinite;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%)}
.go::before{content:"";position:absolute;inset:0;opacity:.08;background-image:url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 16 16' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='8' height='8' fill='white'/%3E%3Crect x='8' y='8' width='8' height='8' fill='white'/%3E%3C/svg%3E");background-size:16px 16px}
.go:disabled{opacity:.12;cursor:not-allowed;animation:none}
.go:active:not(:disabled){transform:scale(.97)}

/* ═══ RESET ═══ */
.rst{width:100%;padding:12px;border:none;border-top:2px solid var(--border);background:var(--card);font-family:'Oswald',sans-serif;font-size:12px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);cursor:pointer;transition:all .2s}
.rst:active{background:var(--card-lit)}

/* ═══ RESULT CARDS — PIT BOARD STYLE ═══ */
.card{margin-bottom:14px;background:var(--card);border:none;border-left:4px solid var(--red);position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;right:0;width:80px;height:80px;opacity:.02;background:repeating-linear-gradient(-45deg,var(--white),var(--white) 2px,transparent 2px,transparent 8px)}
.card .card-inner{padding:20px 18px;position:relative;z-index:1}
/* Pit board header bar */
.card .card-bar{background:linear-gradient(90deg,rgba(204,0,0,0.15),transparent);padding:8px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card .card-bar h3{font-family:'Russo One',sans-serif;font-size:16px;letter-spacing:2px;text-transform:uppercase}
.card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;position:relative;z-index:1}
.card-hdr h3{font-family:'Russo One',sans-serif;font-size:16px;letter-spacing:2px;text-transform:uppercase}
.sev-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;margin-bottom:14px;position:relative;z-index:1;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-left:3px solid}
.sev-badge span{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.intro-text{color:var(--grey);font-size:13px;line-height:1.7;margin-bottom:16px;font-style:italic;position:relative;z-index:1;padding-left:14px;border-left:2px solid rgba(204,0,0,0.25)}

/* ═══ PIT BOARD SUGGESTION ITEMS ═══ */
.sug{padding:14px 16px;margin-bottom:4px;background:rgba(255,255,255,0.01);border:none;border-left:2px solid var(--border);transition:all .2s ease;position:relative;z-index:1}
.sug:hover{border-left-color:var(--red);background:rgba(204,0,0,0.02)}
.sug .num{color:var(--red);font-family:'Russo One',sans-serif;font-size:14px;min-width:28px;opacity:.5}
.sug .adj{color:var(--white);font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.sug .tip{color:#888;font-size:13px;line-height:1.7;margin-left:38px;margin-top:4px;font-family:'Rajdhani',sans-serif;font-weight:500}

/* ═══ INFO / NEUTRAL BOXES ═══ */
.ibox{padding:14px 16px;margin-bottom:8px;position:relative;z-index:1}
.ibox .il{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.ibox p{color:#aaa;font-size:13.5px;line-height:1.65;font-family:'Rajdhani',sans-serif;font-weight:500}
.nbox{padding:20px;background:var(--card);border-left:4px solid var(--grey)}
.nbox h4{font-family:'Russo One',sans-serif;font-size:16px;letter-spacing:2px;color:var(--white);display:flex;align-items:center;gap:8px;margin-bottom:8px;text-transform:uppercase}
.nbox p{color:var(--grey);font-size:13px;line-height:1.6;font-family:'Rajdhani',sans-serif}

/* ═══ DIVIDERS / SECTION LABELS ═══ */
.sep{width:100%;height:3px;margin:16px 0 18px;background:linear-gradient(90deg,var(--red),var(--red-dark) 30%,transparent 70%)}
.sec-lbl{font-family:'Russo One',sans-serif;font-size:14px;letter-spacing:5px;text-transform:uppercase;color:var(--red);margin-bottom:18px;text-align:center;position:relative;padding:8px 0}
.sec-lbl::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:linear-gradient(90deg,transparent,rgba(204,0,0,0.2),transparent)}
.sec-lbl span{background:var(--bg);padding:0 16px;position:relative}

/* ═══ DETAILS ═══ */
details{margin-bottom:16px}
details summary{font-family:'Oswald',sans-serif;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--grey-dark);cursor:pointer;padding:12px 0}
details .ref{padding:16px;background:var(--card);font-size:12px;color:#555;line-height:1.85;font-family:'Rajdhani',sans-serif;font-weight:500}
details .ref strong{color:var(--grey)}

/* ═══ FOOTER ═══ */
.ftr{text-align:center;margin-top:20px;font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#1a1a1a}
.ftr-bar{height:8px;margin:16px -14px 0;background-image:url("data:image/svg+xml,%3Csvg width='16' height='8' viewBox='0 0 16 8' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='8' height='8' fill='%23ccc'/%3E%3Crect x='8' width='8' height='8' fill='%23111'/%3E%3C/svg%3E");background-size:16px 8px;opacity:.1}

/* ═══ TIRE / FUEL INPUTS ═══ */
.tire-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.tire-corner{padding:14px;background:var(--card);border-left:3px solid var(--border)}
.tire-corner.rear{border-left-color:var(--grey-dim)}
.tire-corner-label{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-bottom:8px}
.tire-input,.fuel-input{width:100%;padding:10px 12px;background:#0a0a0a;border:none;border-bottom:2px solid var(--border);color:var(--white);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;text-align:center;transition:all .2s ease}
.tire-input:focus,.fuel-input:focus{outline:0;border-bottom-color:var(--red)}
.tire-input::placeholder,.fuel-input::placeholder{color:#2a2a2a}
.fuel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.fuel-field{display:flex;flex-direction:column;gap:4px}
.fuel-field.wide{grid-column:1/-1}
.fuel-field label{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--grey-dark)}
.fuel-result{padding:16px;background:var(--card);border-left:4px solid var(--red);margin-bottom:8px}
.fuel-result .fuel-big{font-family:'Russo One',sans-serif;font-size:28px;color:var(--white);line-height:1}
.fuel-result .fuel-unit{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--grey-dark);margin-top:3px}
.fuel-result .fuel-label{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--grey-dark);margin-bottom:4px}
.fuel-ok{border-left-color:#1a8a2e}
.fuel-warn{border-left-color:#cc8800}
.fuel-stop{border-left-color:var(--red)}
.fuel-grid-results{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.fuel-tip{padding:12px 14px;border-left:2px solid var(--red);background:rgba(204,0,0,0.02);font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--grey);line-height:1.6;font-weight:500}
.fuel-tip strong{color:var(--white)}

/* ═══ SESSION LOGGER ═══ */
.log-form{display:flex;flex-direction:column;gap:12px}
.log-field{display:flex;flex-direction:column;gap:4px}
.log-field label{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--grey-dark)}
.log-input,.log-textarea{width:100%;padding:10px 14px;background:#0a0a0a;border:none;border-bottom:2px solid var(--border);color:var(--white);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;transition:all .2s ease}
.log-input:focus,.log-textarea:focus{outline:0;border-bottom-color:var(--red)}
.log-input::placeholder,.log-textarea::placeholder{color:#2a2a2a}
.log-textarea{min-height:70px;resize:vertical;line-height:1.5}
.log-save{padding:14px;border:none;font-family:'Russo One',sans-serif;font-size:14px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;background:var(--red);color:white;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%)}
.log-save:active{transform:scale(.97)}
.log-save:disabled{opacity:.2;cursor:not-allowed}
.log-entry{padding:14px 16px;background:var(--card);border-left:3px solid var(--red);margin-bottom:8px;position:relative}
.log-entry .log-date{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--grey-dark);margin-bottom:6px}
.log-entry .log-meta{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--white);margin-bottom:3px}
.log-entry .log-meta span{color:var(--red)}
.log-entry .log-issue{font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--grey);margin-bottom:3px}
.log-entry .log-changes{font-family:'Rajdhani',sans-serif;font-size:13px;color:#bbb;line-height:1.5}
.log-entry .log-notes{font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--grey-dark);font-style:italic;margin-top:4px;padding-top:4px;border-top:1px solid var(--border)}
.log-del{position:absolute;top:10px;right:10px;background:none;border:1px solid #222;color:#444;font-size:10px;padding:2px 6px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase}
.log-del:active{border-color:var(--red);color:var(--red)}
.log-empty{text-align:center;padding:24px;color:var(--grey-dark);font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase}
.log-divider{height:2px;background:linear-gradient(90deg,var(--red),#1a1a1a 50%,transparent);margin:18px 0}

.gap{margin-bottom:20px}.hide{display:none!important}
</style>
</head>
<body>
<div class="bg"><div class="stripe"></div><div class="stripe2"></div><div class="glow"></div></div>

<!-- Car Silhouette (changes per car via JS) -->
<div class="silhouette" id="silhouette"></div>

<div class="app" id="app">

<!-- ═══ HEADER ═══ -->
<div class="hdr">
  <div class="chk-top"></div>
  <div class="red-bar"></div>
  <div class="logo-wrap">
    <img src="logo.png" alt="The Big Chief" style="width:min(80%,360px);height:auto;margin:0 auto;display:block">
  </div>
  <p class="sub">iRacing Setup Advisor</p>
  <div class="tag-row"><span class="tag">Multi-Car</span><span class="tag">Manual Verified</span></div>
</div>

<!-- ═══ TACHOMETER ═══ -->
<div class="tach-wrap">
<div class="tach">
<svg viewBox="0 0 160 90" xmlns="http://www.w3.org/2000/svg">
  <!-- Gauge arc background -->

  var logs=JSON.parse(localStorage.getItem("bigchief-logs")||"[]");
  // Filter by current car
  var filtered=logs.filter(function(e){return e.carKey===S.car});
  if(filtered.length===0){
    el.innerHTML='<div class="log-empty">No sessions logged for '+C().name+' yet</div>';
    return;
  }
  var h="";
  filtered.forEach(function(e){
    h+='<div class="log-entry" style="animation:fadeUp .3s ease both">';
    h+='<button class="log-del" onclick="deleteLog('+e.id+')">Delete</button>';
    h+='<div class="log-date">'+e.date+'</div>';
    h+='<div class="log-meta"><span>'+e.track+'</span></div>';
    if(e.issue)h+='<div class="log-issue">Issue: '+e.issue+'</div>';
    if(e.changes)h+='<div class="log-changes">Changes: '+e.changes+'</div>';
    if(e.notes)h+='<div class="log-notes">'+e.notes+'</div>';
    h+='</div>';
  });
  el.innerHTML=h;
}

// ═══ FUEL PLANNER ═══════════════════════════════════════════
function updateFuelTank(){$("fuel-tank").placeholder=C().tank+" ("+C().name+")";if(!$("fuel-tank").value)$("fuel-tank").value=""}

function calcFuel(){
  updateFuelTank();
  var el=$("fuel-results");
  var format=$("fuel-format").value;
  var length=parseFloat($("fuel-length").value);
  var laptime=parseFloat($("fuel-laptime").value);
  var perlap=parseFloat($("fuel-perlap").value);
  var tank=parseFloat($("fuel-tank").value)||C().tank;
  var buffer=parseInt($("fuel-buffer").value)||2;
  
  if(!length||!laptime||!perlap){el.innerHTML='<div class="log-empty">Enter race info above to calculate fuel</div>';return}
  
  var totalLaps;
  if(format==="time"){totalLaps=Math.ceil((length*60)/laptime)}
  else{totalLaps=length}
  
  var raceLaps=totalLaps;
  var fuelNeeded=raceLaps*perlap;
  var fuelWithBuffer=(raceLaps+buffer)*perlap;
  var lapsPerTank=Math.floor(tank/perlap);
  var canMakeIt=fuelWithBuffer<=tank;
  var raceTimeMin=(raceLaps*laptime)/60;
  
  var h="";
  
  if(canMakeIt){
    h+='<div class="fuel-result fuel-ok"><div class="fuel-label">Recommended Fuel Fill</div><div class="fuel-big">'+fuelWithBuffer.toFixed(1)+' <span style="font-size:16px;color:var(--grey)">gal</span></div><div class="fuel-unit">No pit stop needed · '+buffer+' lap buffer included</div></div>';
  }else{
    var stops=Math.ceil(fuelNeeded/tank)-1;
    if(stops<1)stops=1;
    h+='<div class="fuel-result fuel-stop"><div class="fuel-label">Pit Stops Required</div><div class="fuel-big">'+stops+' <span style="font-size:16px;color:var(--grey)">stop'+(stops>1?"s":"")+'</span></div><div class="fuel-unit">Fill to '+tank.toFixed(1)+' gal each stop</div></div>';
  }
  
  h+='<div class="fuel-grid-results">';
  h+='<div class="fuel-result"><div class="fuel-label">Total Race Laps</div><div class="fuel-big">'+raceLaps+'</div><div class="fuel-unit">'+(format==="time"?length+" min race":"")+'</div></div>';
  h+='<div class="fuel-result"><div class="fuel-label">Total Fuel Needed</div><div class="fuel-big">'+fuelNeeded.toFixed(1)+'</div><div class="fuel-unit">gallons (no buffer)</div></div>';
  h+='<div class="fuel-result"><div class="fuel-label">Laps Per Tank</div><div class="fuel-big">'+lapsPerTank+'</div><div class="fuel-unit">on '+tank.toFixed(1)+' gal tank</div></div>';
  h+='<div class="fuel-result"><div class="fuel-label">Race Time</div><div class="fuel-big">'+raceTimeMin.toFixed(1)+'</div><div class="fuel-unit">minutes</div></div>';
  h+='</div>';
  
  if(!canMakeIt){
    var stops2=Math.ceil(fuelNeeded/tank)-1;
    if(stops2<1)stops2=1;
    var lapsPerStint=Math.floor(tank/perlap);
    h+='<label class="lbl" style="margin-top:8px">Stint Breakdown</label>';
    var lapsRemaining=raceLaps;
    for(var i=0;i<=stops2;i++){
      var stintLaps=Math.min(lapsPerStint,lapsRemaining);
      var stintFuel=stintLaps*perlap;
      var isLast=i===stops2;
      var pitOn=(i+1)*lapsPerStint;
      h+='<div class="fuel-result" style="border-left-color:'+(isLast?"#1a8a2e":"var(--red)")+';margin-bottom:8px">';
      h+='<div class="fuel-label">Stint '+(i+1)+(isLast?" (Final)":"")+'</div>';
      h+='<div style="font-family:Oswald;font-size:16px;font-weight:600;color:var(--white)">'+stintLaps+' laps · '+stintFuel.toFixed(1)+' gal</div>';
      if(!isLast)h+='<div class="fuel-unit">Pit on lap ~'+pitOn+' · Fill to '+tank.toFixed(1)+' gal</div>';
      else h+='<div class="fuel-unit" style="color:#1a8a2e">🏁 Checkered flag</div>';
      h+='</div>';
      lapsRemaining-=stintLaps;
    }
  }
  
  var excessIfFull=tank-fuelWithBuffer;
  if(canMakeIt&&excessIfFull>1){
    var weightSaved=(excessIfFull*6.1).toFixed(0);
    h+='<div class="fuel-tip" style="margin-top:8px"><strong>Weight Tip:</strong> Filling to '+fuelWithBuffer.toFixed(1)+' gal instead of a full '+tank.toFixed(1)+' gal tank saves '+excessIfFull.toFixed(1)+' gal / ~'+weightSaved+' lbs. Less weight = faster laps and easier on tires.</div>';
  }
  
  h+='<div class="fuel-tip" style="margin-top:8px"><strong>How to find fuel per lap:</strong> In iRacing, press F4 during practice to open the Fuel black box. Run a few clean laps and it shows your fuel usage per lap.</div>';
  
  el.innerHTML=h;
}

["fuel-format","fuel-length","fuel-laptime","fuel-perlap","fuel-tank","fuel-buffer"].forEach(function(id){
  $(id).addEventListener("input",calcFuel);
  $(id).addEventListener("change",calcFuel);
});
